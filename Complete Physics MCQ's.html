    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #F8FAFC; 
        }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Custom Radio Button styling */
        input[type="radio"] {
            appearance: none;
            background-color: #fff;
            margin: 0;
            font: inherit;
            color: currentColor;
            width: 1.25em;
            height: 1.25em;
            border: 2px solid #cbd5e1;
            border-radius: 50%;
            display: grid;
            place-content: center;
            transition: all 0.2s ease-in-out;
        }

        input[type="radio"]::before {
            content: "";
            width: 0.65em;
            height: 0.65em;
            border-radius: 50%;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em white;
        }

        input[type="radio"]:checked {
            border-color: currentColor;
            background-color: currentColor;
        }

        input[type="radio"]:checked::before {
            transform: scale(1);
        }

        /* Option Label Transitions */
        .option-label {
            transition: all 0.2s ease;
        }
    </style>
</head>

            { q: "Which factor does NOT affect loudness?", options: ["Area of vibrating body", "Distance from source", "Amplitude", "Frequency"], answer: 3, exp: "Frequency affects pitch, not how 'loud' or 'soft' the sound feels." },
            { q: "The unit used to measure sound intensity level is:", options: ["Hertz", "Newton", "Decibel (dB)", "Meter"], answer: 2, exp: "The decibel is a logarithmic unit used to express the ratio of intensity to a reference level." },
            { q: "As the distance from the source increases, loudness:", options: ["Increases", "Decreases", "Remains same", "Becomes zero"], answer: 1, exp: "Sound energy spreads over a larger area as it travels, reducing the intensity and loudness." },
            { q: "A woman's voice is generally shriller than a man's because of higher:", options: ["Loudness", "Amplitude", "Frequency", "Velocity"], answer: 2, exp: "Shorter vocal cords vibrate faster, producing a higher frequency and thus a higher pitch." },
            { q: "Intensity is defined as energy passing per unit time through unit ____:", options: ["Volume", "Length", "Area", "Mass"], answer: 2, exp: "Intensity (I) = Power / Area. It is measured in Watts per square meter (W/m²)." },
            { q: "The faintest sound a human ear can hear (Threshold) is:", options: ["10^-12 W/m²", "1 W/m²", "0 dB", "Both A and C"], answer: 3, exp: "10^-12 W/m² is the reference intensity defined as 0 decibels." },
            { q: "If the amplitude of a sound wave is doubled, its intensity increases by:", options: ["2 times", "4 times", "Remain same", "8 times"], answer: 1, exp: "Intensity is directly proportional to the square of the amplitude (I ∝ A²)." }
        ],
        "11.3 Reflection & Echo": [
            { q: "The repetition of sound due to reflection is called:", options: ["Rarefaction", "Echo", "Diffraction", "Pitch"], answer: 1, exp: "Echo occurs when sound hits a hard surface and bounces back to the listener." },
            { q: "To hear a clear echo, the minimum distance from the obstacle must be:", options: ["10 m", "17 m", "34 m", "100 m"], answer: 1, exp: "Sound travels at ~340m/s. Since the brain needs 0.1s to distinguish sounds, the total path (there and back) must be 34m, meaning the wall is 17m away." },
            { q: "The sensation of sound persists in our brain for about:", options: ["1 second", "0.5 seconds", "0.1 seconds", "0.01 seconds"], answer: 2, exp: "This 0.1s 'persistence of hearing' is why sounds overlapping within this time blur together." },
            { q: "Reflection of sound follows the same laws as:", options: ["Heat", "Magnetism", "Light", "Gravity"], answer: 2, exp: "The angle of incidence equals the angle of reflection for sound waves, just like light." },
            { q: "Hard and smooth surfaces are ____ reflectors of sound:", options: ["Bad", "Good", "Transparent", "Absorbent"], answer: 1, exp: "Hard surfaces like concrete or steel bounce sound back effectively." },
            { q: "Soft and porous surfaces ____ sound waves:", options: ["Reflect", "Absorb", "Magnify", "Speed up"], answer: 1, exp: "Porous materials (curtains, foam) trap sound energy, preventing echoes." },
            { q: "The technique used to find the depth of the ocean is:", options: ["Radar", "Sonar", "Laser", "Echo-location"], answer: 1, exp: "SONAR (Sound Navigation and Ranging) sends ultrasound pulses to the seabed and measures reflection time." },
            { q: "A person claps near a cliff and hears an echo after 2s. If v=340m/s, the distance is:", options: ["680 m", "340 m", "170 m", "100 m"], answer: 1, exp: "Distance = (v * t) / 2 = (340 * 2) / 2 = 340 meters." }
        ],
        "11.4 Audible Range & Ultrasound": [
            { q: "The audible frequency range for a normal human ear is:", options: ["10 - 10,000 Hz", "20 - 20,000 Hz", "50 - 50,000 Hz", "1 - 100 Hz"], answer: 1, exp: "Sounds below 20Hz (infrasonic) or above 20,000Hz (ultrasonic) cannot be heard by humans." },
            { q: "As people grow older, their upper hearing limit ____:", options: ["Increases", "Decreases", "Stays same", "Becomes zero"], answer: 1, exp: "The ear becomes less sensitive to high-frequency sounds with age." },
            { q: "Sound of frequency higher than 20,000 Hz is called:", options: ["Infrasound", "Ultrasound", "Supersound", "Audible sound"], answer: 1, exp: "Ultrasound has very high frequency and short wavelength, making it useful in medicine and industry." },
            { q: "Which of the following use ultrasound for navigation?", options: ["Dogs", "Bats", "Cats", "Humans"], answer: 1, exp: "Bats emit ultrasound pulses to detect obstacles and prey in the dark (echolocation)." },
            { q: "Ultrasound is used in medicine to:", options: ["Measure blood pressure", "Break kidney stones", "Clean clothes", "Cook food"], answer: 1, exp: "Powerful ultrasound waves can disintegrate small stones without surgery (Lithotripsy)." },
            { q: "Why is ultrasound used for detecting small flaws in metals?", options: ["It is cheap", "It has short wavelength", "It travels very slow", "It is audible"], answer: 1, exp: "Short wavelengths allow the waves to reflect off even tiny cracks or defects." },
            { q: "Infrasonic sounds have frequencies:", options: ["Less than 20 Hz", "More than 20,000 Hz", "Between 20-20,000 Hz", "Exactly 100 Hz"], answer: 0, exp: "Infrasound is low-frequency sound, often produced by earthquakes or large animals like elephants." },
            { q: "Echo-sounding uses ____ to calculate distances:", options: ["Radio waves", "Light waves", "Ultrasound", "Infrared"], answer: 2, exp: "Ultrasound is preferred because it is directional and carries high energy." }
        ],
        "11.5 Intensity & Decibels": [
            { q: "Logarithm of intensity (log I) is used in the formula for:", options: ["Pitch", "Intensity Level", "Frequency", "Wavelength"], answer: 1, exp: "L = k log(I). The human ear responds logarithmically to sound intensity." },
            { q: "If intensity level is 10 dB, the intensity is ____ times I₀:", options: ["2", "10", "100", "1000"], answer: 1, exp: "Every 10 dB increase represents a 10-fold increase in actual intensity." },
            { q: "The difference (L - L₀) is called:", options: ["Sound Intensity", "Sound Intensity Level", "Loudness", "Decibel"], answer: 1, exp: "Intensity level is the difference between the loudness of a sound and the loudness of the faintest audible sound." },
            { q: "A whisper usually has an intensity level of about:", options: ["0 dB", "30 dB", "70 dB", "120 dB"], answer: 1, exp: "30 dB is a common level for soft speech or a quiet library." },
            { q: "The 'Bel' is a ____ unit than the decibel:", options: ["Smaller", "Larger", "Equivalent", "Scientific"], answer: 1, exp: "1 Bel = 10 Decibels. The 'Bel' is usually too large for everyday sound measurements." },
            { q: "Sound levels above ____ dB can be painful to the human ear:", options: ["20", "50", "80", "120"], answer: 3, exp: "120 dB is the threshold of pain; prolonged exposure can cause permanent hearing loss." }
        ],
        "11.6 Acoustic Protection": [
            { q: "Technique used to reduce undesirable sounds is:", options: ["Acoustic protection", "Resonance", "Reverberation", "Echo-location"], answer: 0, exp: "It involves using sound-absorbent materials to quieten rooms or theaters." },
            { q: "The multiple reflections of sound in a big hall are called:", options: ["Echo", "Reverberation", "Refraction", "Diffraction"], answer: 1, exp: "Reverberation is the 'echoey' persistence of sound after the source has stopped." },
            { q: "To improve acoustics in a cinema, walls are covered with:", options: ["Mirrors", "Polished wood", "Porous materials", "Metal sheets"], answer: 2, exp: "Materials like carpets and heavy curtains absorb sound and reduce reverberation." },
            { q: "Too much reverberation makes sound:", options: ["Clearer", "Loud and garbled", "Silent", "Shrill"], answer: 1, exp: "When sound persists too long, new words overlap old ones, making speech hard to understand." }
        ],
        "11.7 Mixed Review & Numerical Concepts": [
            { q: "The speed of sound in water is approximately:", options: ["340 m/s", "1500 m/s", "5000 m/s", "3 x 10^8 m/s"], answer: 1, exp: "Sound travels about 4-5 times faster in water than in air." },
            { q: "Which property of sound waves changes with temperature?", options: ["Pitch", "Wavelength", "Speed", "Quality"], answer: 2, exp: "As air gets warmer, molecules move faster, transmitting vibrations (sound) more quickly." },
            { q: "Noise is sound that is:", options: ["Musical", "Pleasant", "Jarring and unpleasant", "High pitch"], answer: 2, exp: "Noise consists of irregular and sudden vibrations that are annoying to the ear." },
            { q: "A musical sound has ____ vibrations:", options: ["Random", "Irregular", "Periodic and regular", "Very loud"], answer: 2, exp: "Regular patterns create what we perceive as musical notes." },
            { q: "Sound intensity level of a jet engine is roughly:", options: ["10 dB", "50 dB", "100 dB", "150 dB"], answer: 3, exp: "Jet engines are extremely loud, reaching levels that cause immediate discomfort." },
            { q: "What is the frequency of a sound wave with λ=0.5m and v=340m/s?", options: ["170 Hz", "680 Hz", "340 Hz", "700 Hz"], answer: 1, exp: "f = v / λ = 340 / 0.5 = 680 Hz." },
            { q: "The loudness of sound depends on the area of vibrating body. Larger area means:", options: ["Fainter sound", "Loud sound", "Same sound", "No sound"], answer: 1, exp: "A larger surface area can move more air molecules, producing a louder sound (e.g., a large drum)." },
            { q: "Loudness is a ____ sensation:", options: ["Physical", "Subjective", "Objective", "Magnetic"], answer: 1, exp: "Loudness varies from person to person depending on ear sensitivity, whereas intensity is an objective physical quantity." },
            { q: "Two sounds have the same intensity but different pitch. They differ in:", options: ["Frequency", "Amplitude", "Velocity", "Loudness"], answer: 0, exp: "Pitch is purely the human perception of frequency." },
            { q: "Ultrasound can be used to clean:", options: ["Ovens", "Delicate machinery parts", "Large buildings", "Clouds"], answer: 1, exp: "High-frequency vibrations in a cleaning liquid can remove dirt from hard-to-reach crevices." },
            { q: "In the relation v = fλ, if 'v' increases and 'f' stays same:", options: ["λ increases", "λ decreases", "λ stays same", "f decreases"], answer: 0, exp: "Wavelength must increase to balance the equation when velocity increases." },
            { q: "Sound waves are not transmitted through vacuum because:", options: ["They are too fast", "No particles to vibrate", "Vacuum is cold", "Light blocks them"], answer: 1, exp: "Mechanical waves like sound rely on particle collisions to propagate." },
            { q: "The frequency of a tuning fork is marked 256 Hz. It means it vibrates ____ times per second:", options: ["128", "256", "512", "1"], answer: 1, exp: "Frequency is defined as vibrations per second." },
            { q: "A sound of 80 dB is ____ times more intense than a sound of 70 dB:", options: ["2", "10", "100", "1.1"], answer: 1, exp: "A 10 dB difference corresponds to a factor of 10 in intensity." },
            { q: "The speed of sound in steel is approximately:", options: ["340 m/s", "1500 m/s", "5000-6000 m/s", "30,000 m/s"], answer: 2, exp: "Steel is highly elastic and dense, making it an excellent conductor of sound." },
            { q: "SONAR stands for:", options: ["Sound Note and Range", "Sound Navigation and Ranging", "Solar Navigation", "Sound Nature"], answer: 1, exp: "It is the standard acronym for the technology used to navigate or detect objects underwater." },
            { q: "The angle between the reflected sound and the normal is ____ to the angle of incidence:", options: ["Double", "Half", "Equal", "Square"], answer: 2, exp: "Law of reflection: i = r." },
            { q: "Human lungs act as a ____ for sound production:", options: ["Source of vibration", "Source of air pressure", "Reflector", "Receiver"], answer: 1, exp: "Lungs provide the steady stream of air needed to make vocal cords vibrate." },
            { q: "A high-pitched sound is often called a ____ sound:", options: ["Flat", "Grave", "Shrill", "Deep"], answer: 2, exp: "Shrillness is another word for high pitch." },
            { q: "The intensity level of the rustling of leaves is about:", options: ["0 dB", "10 dB", "40 dB", "60 dB"], answer: 1, exp: "10 dB is the level of very faint sounds like leaves rustling or light breathing." },
            { q: "The 'threshold of hearing' is the ____ sound a human can hear:", options: ["Loudest", "Faintest", "Highest pitch", "Lowest pitch"], answer: 1, exp: "It is the limit of our auditory sensitivity." },
            { q: "Which of the following is an ultrasound frequency?", options: ["50 Hz", "5,000 Hz", "15,000 Hz", "25,000 Hz"], answer: 3, exp: "25kHz is above the 20kHz limit, so it is ultrasonic." },
            { q: "The outer ear is called:", options: ["Cochlea", "Pinna", "Eardrum", "Stirrup"], answer: 1, exp: "The pinna helps collect sound waves and funnel them into the ear canal." },
            { q: "The eardrum is also known as the:", options: ["Hammer", "Anvil", "Tympanum", "Auditory nerve"], answer: 2, exp: "The tympanic membrane vibrates when sound waves hit it." },
            { q: "Sound waves are converted into electrical signals in the:", options: ["Pinna", "Middle ear", "Cochlea", "Throat"], answer: 2, exp: "The cochlea contains tiny hairs that turn vibrations into nerve impulses." },
            { q: "The number of bones in the human middle ear is:", options: ["1", "3", "10", "None"], answer: 1, exp: "Hammer, Anvil, and Stirrup (the smallest bones in the body) amplify vibrations." },
            { q: "Which device is used to see the heart's movement using ultrasound?", options: ["X-ray", "Echocardiogram", "Thermometer", "Stethoscope"], answer: 1, exp: "Echocardiography uses sound reflections to create images of the heart." },
            { q: "The speed of sound depends on the ____ of the medium:", options: ["Color", "Temperature and Nature", "Shape", "Weight"], answer: 1, exp: "Both the material (solid/liquid/gas) and its temperature affect speed." },
            { q: "Noise pollution can cause:", options: ["Fever", "Hearing loss and Stress", "Blindness", "Cough"], answer: 1, exp: "Loud noise is a significant environmental health risk." },
            { q: "Acoustic materials should be:", options: ["Smooth and hard", "Soft and porous", "Shiny", "Metallic"], answer: 1, exp: "Soft materials prevent the reflection of sound." },
            { q: "The wavelength of ultrasound is ____ than that of audible sound:", options: ["Greater", "Smaller", "Equal", "Infinite"], answer: 1, exp: "Since frequency is very high, wavelength must be very small (λ = v/f)." },
            { q: "Whales communicate over long distances in water because:", options: ["They are loud", "Sound travels well in water", "Water is cold", "They use light"], answer: 1, exp: "Water is an excellent medium for sound, allowing it to travel hundreds of miles." },
            { q: "The pitch of a whistle is higher than a drum because of:", options: ["Amplitude", "Frequency", "Size", "Material"], answer: 1, exp: "Higher vibration rate = higher pitch." },
            { q: "Loudness level of 0 dB does not mean zero sound, it means:", options: ["Silence", "Sound is at threshold of hearing", "Ear is blocked", "No frequency"], answer: 1, exp: "0 dB is a reference point, not the physical absence of sound energy." },
            { q: "Sound is a ____ wave:", options: ["Pressure", "Transverse", "Non-mechanical", "Electromagnetic"], answer: 0, exp: "Sound consists of regions of high and low pressure." },
            { q: "Reflection of sound is used in:", options: ["Mirrors", "Megaphones and Hearing aids", "Lenses", "Batteries"], answer: 1, exp: "Devices like megaphones use a funnel shape to reflect and direct sound forward." },
            { q: "The hearing range of a dog is:", options: ["Lower than humans", "Same as humans", "Higher than humans", "Zero"], answer: 2, exp: "Dogs can hear ultrasound frequencies (up to ~45,000 Hz)." },
            { q: "Which medium is the best conductor of sound?", options: ["Air", "Water", "Iron", "Oxygen"], answer: 2, exp: "Metals (solids) generally conduct sound much faster and more clearly than gases." },
            { q: "Frequency of 1 kiloHertz (kHz) is equal to:", options: ["10 Hz", "100 Hz", "1000 Hz", "1,000,000 Hz"], answer: 2, exp: "Kilo means thousand." },
            { q: "If we tighten a guitar string, the pitch:", options: ["Increases", "Decreases", "Stays same", "Disappears"], answer: 0, exp: "Higher tension makes the string vibrate faster, increasing frequency." }
        ]
    }
},
            "12": {
    title: "Geometrical Optics",
    topics: {
        "12.1 Reflection of Light": [
            { q: "The turning back of light into the same medium after striking a surface is:", options: ["Refraction", "Reflection", "Diffraction", "Absorption"], answer: 1, exp: "Reflection is the phenomenon where light bounces off a surface back into the original medium." },
            { q: "According to the first law of reflection, the angle of incidence is ____ to the angle of reflection:", options: ["Greater", "Smaller", "Equal", "Half"], answer: 2, exp: "The law of reflection states that ∠i = ∠r." },
            { q: "The normal is a line drawn ____ to the reflecting surface at the point of incidence:", options: ["Parallel", "At 45 degrees", "Perpendicular", "Tangent"], answer: 2, exp: "A normal is a mathematical line at 90° to the surface used for measuring angles." },
            { q: "Regular reflection occurs when light strikes a ____ surface:", options: ["Rough", "Smooth and polished", "Opaque", "Transparent"], answer: 1, exp: "Smooth surfaces like mirrors reflect parallel rays in one direction." },
            { q: "Irregular or diffused reflection occurs on ____ surfaces:", options: ["Polished", "Plane", "Rough", "Clear"], answer: 2, exp: "Rough surfaces scatter light in many different directions." },
            { q: "We can see non-luminous objects around us due to:", options: ["Regular reflection", "Refraction", "Diffused reflection", "Internal reflection"], answer: 2, exp: "Diffused reflection scatters light into our eyes from various angles." },
            { q: "A plane mirror always forms a ____ image:", options: ["Real", "Virtual", "Inverted", "Magnified"], answer: 1, exp: "Images in plane mirrors cannot be obtained on a screen and are upright but laterally inverted." },
            { q: "The distance of the image from a plane mirror is ____ the distance of the object:", options: ["Twice", "Half", "Equal to", "Square of"], answer: 2, exp: "In plane mirrors, d_i = d_o." },
            { q: "If you stand 2m in front of a plane mirror, the distance between you and your image is:", options: ["2m", "4m", "1m", "0m"], answer: 1, exp: "2m to the mirror + 2m from mirror to image = 4m." },
            { q: "Laterally inverted means the left of the object appears as the ____ of the image:", options: ["Top", "Bottom", "Right", "Left"], answer: 2, exp: "Mirrors flip the image horizontally." }
        ],
        "12.2 Spherical Mirrors": [
            { q: "A mirror whose reflecting surface is a part of a hollow sphere is called:", options: ["Plane mirror", "Spherical mirror", "Vertical mirror", "Convex lens"], answer: 1, exp: "Spherical mirrors are sections of a sphere with one side silvered." },
            { q: "A spherical mirror with an inner curved reflecting surface is:", options: ["Convex mirror", "Concave mirror", "Plane mirror", "Bifocal mirror"], answer: 1, exp: "Concave mirrors 'cave in' and are also known as converging mirrors." },
            { q: "A spherical mirror with an outer curved reflecting surface is:", options: ["Convex mirror", "Concave mirror", "Converging mirror", "Parabolic mirror"], answer: 0, exp: "Convex mirrors bulge out and are known as diverging mirrors." },
            { q: "The center of the spherical mirror is called:", options: ["Center of curvature", "Pole (Vertex)", "Principal focus", "Aperture"], answer: 1, exp: "The geometric center of the reflecting surface itself is the Pole." },
            { q: "The center of the hollow sphere of which the mirror is a part is the:", options: ["Pole", "Principal focus", "Center of Curvature (C)", "Optical center"], answer: 2, exp: "C is the center of the original sphere from which the mirror was cut." },
            { q: "The line joining the Pole and the Center of Curvature is the:", options: ["Radius", "Principal Axis", "Focal length", "Aperture"], answer: 1, exp: "The Principal Axis is the horizontal reference line for the mirror." },
            { q: "The distance from the Pole to the Center of Curvature is the:", options: ["Focal length", "Radius of Curvature (R)", "Diameter", "Image distance"], answer: 1, exp: "R represents the radius of the sphere." },
            { q: "The point where parallel rays meet after reflection from a concave mirror is:", options: ["Pole", "Center of curvature", "Principal Focus (F)", "Aperture"], answer: 2, exp: "Concave mirrors converge light to a single point called the Focus." },
            { q: "For a convex mirror, the focus is ____ the mirror:", options: ["In front of", "Behind", "On the surface of", "At infinity"], answer: 1, exp: "Rays appear to diverge from a point behind the convex mirror, making it a virtual focus." },
            { q: "The distance between the Pole and the Principal Focus is the:", options: ["Radius", "Focal length (f)", "Aperture", "Object distance"], answer: 1, exp: "f = R / 2." },
            { q: "If the radius of curvature is 20cm, the focal length is:", options: ["40cm", "20cm", "10cm", "5cm"], answer: 2, exp: "f = R/2 = 20/2 = 10cm." },
            { q: "A concave mirror acts as a ____ mirror:", options: ["Diverging", "Converging", "Neutral", "Refracting"], answer: 1, exp: "It brings parallel rays together." },
            { q: "A convex mirror acts as a ____ mirror:", options: ["Diverging", "Converging", "Magnifying", "Real"], answer: 0, exp: "It spreads light rays apart." },
            { q: "The focal length of a concave mirror is taken as:", options: ["Positive", "Negative", "Zero", "Infinite"], answer: 0, exp: "In sign convention, converging elements have positive focal lengths." },
            { q: "The focal length of a convex mirror is taken as:", options: ["Positive", "Negative", "Zero", "Constant"], answer: 1, exp: "Diverging elements have negative focal lengths because the focus is virtual." },
            { q: "Mirror formula is expressed as:", options: ["1/f = 1/p + 1/q", "f = p + q", "1/f = p - q", "f = p/q"], answer: 0, exp: "The fundamental relation between focal length (f), object distance (p), and image distance (q)." },
            { q: "In the mirror formula, 'q' is negative for a:", options: ["Real image", "Virtual image", "Inverted image", "Magnified image"], answer: 1, exp: "Virtual images are formed behind the mirror, denoted by -q." },
            { q: "An object placed at 'C' of a concave mirror forms an image at:", options: ["F", "Between F and C", "C", "Beyond C"], answer: 2, exp: "At C, the image is real, inverted, and the same size as the object." },
            { q: "To get a virtual, upright, and magnified image with a concave mirror, place the object:", options: ["At C", "At F", "Between F and P", "Beyond C"], answer: 2, exp: "This is the 'magnifying glass' effect of a concave mirror." },
            { q: "Rear-view mirrors in cars are usually:", options: ["Concave", "Plane", "Convex", "Parabolic"], answer: 2, exp: "Convex mirrors provide a wider field of view and always show upright images." }
        ],
        "12.3 Refraction of Light": [
            { q: "The bending of light as it passes from one transparent medium to another is:", options: ["Reflection", "Refraction", "Diffraction", "Polarization"], answer: 1, exp: "Refraction occurs due to the change in the speed of light in different media." },
            { q: "When light enters from air (rarer) to glass (denser), it bends:", options: ["Away from normal", "Towards the normal", "Not at all", "Backwards"], answer: 1, exp: "Light slows down in denser media, causing it to bend toward the normal line." },
            { q: "The ratio of sin(i) to sin(r) is constant, known as:", options: ["Mirror formula", "Snell's Law", "Newton's Law", "Ohm's Law"], answer: 1, exp: "n = sin i / sin r." },
            { q: "The refractive index of a medium is defined as n =:", options: ["v / c", "c / v", "c + v", "c * v"], answer: 1, exp: "n is the ratio of speed of light in vacuum (c) to speed in the medium (v)." },
            { q: "The speed of light in vacuum is approximately:", options: ["3 x 10^5 m/s", "3 x 10^8 m/s", "340 m/s", "1500 m/s"], answer: 1, exp: "Light is the fastest entity in the universe at 300,000,000 m/s." },
            { q: "Refractive index of water is approximately:", options: ["1.00", "1.33", "1.52", "2.42"], answer: 1, exp: "Water bends light less than glass (1.5) or diamond (2.42)." },
            { q: "Which medium has the highest refractive index?", options: ["Air", "Water", "Glass", "Diamond"], answer: 3, exp: "Diamond (n=2.42) slows light down significantly, leading to its 'sparkle'." },
            { q: "A swimming pool appears shallower than it actually is due to:", options: ["Reflection", "Refraction", "Diffraction", "Absorption"], answer: 1, exp: "Light rays bending as they exit the water make the bottom appear higher." },
            { q: "The refractive index of air is taken as:", options: ["0", "1.00", "1.33", "1.50"], answer: 1, exp: "Air is used as the standard reference, nearly equal to vacuum." }
        ],
        "12.4 Total Internal Reflection": [
            { q: "The angle of incidence for which the angle of refraction is 90° is called:", options: ["Normal angle", "Critical angle", "Refractive angle", "Zero angle"], answer: 1, exp: "At the critical angle, the refracted ray travels along the boundary." },
            { q: "Total internal reflection occurs only when light travels from:", options: ["Rarer to denser medium", "Denser to rarer medium", "Air to water", "Vacuum to air"], answer: 1, exp: "Light must be trying to speed up to be pushed back into the original medium." },
            { q: "If the angle of incidence is greater than the critical angle, the result is:", options: ["Refraction", "Total Internal Reflection", "Diffraction", "Dispersion"], answer: 1, exp: "No light escapes; the surface acts like a perfect mirror." },
            { q: "Optical fibers work on the principle of:", options: ["Total Internal Reflection", "Refraction", "Diffraction", "Scattering"], answer: 0, exp: "Light stays trapped inside the glass core through continuous internal reflections." },
            { q: "The 'sparkling' of a diamond is due to its low critical angle and:", options: ["Refraction", "Total Internal Reflection", "Reflection", "Transmission"], answer: 1, exp: "Light reflects multiple times inside the diamond before exiting." },
            { q: "A mirage is an optical illusion caused by:", options: ["Mirror reflection", "Atmospheric refraction", "Dust", "Rainbows"], answer: 1, exp: "Temperature gradients in air bend light rays, creating fake water reflections on roads." },
            { q: "Endoscopes used by doctors utilize:", options: ["Lenses", "Optical fibers", "Mirrors", "Prisms"], answer: 1, exp: "Optical fibers allow doctors to see inside the human body by transmitting light/images." }
        ],
        "12.5 Lenses": [
            { q: "A transparent material with two surfaces, at least one of which is curved, is a:", options: ["Mirror", "Lens", "Prism", "Slab"], answer: 1, exp: "Lenses use refraction to form images." },
            { q: "A lens that is thicker at the center and thinner at the edges is:", options: ["Concave lens", "Convex lens", "Plano-concave", "Diverging lens"], answer: 1, exp: "Convex lenses converge light rays." },
            { q: "A lens that is thinner at the center and thicker at the edges is:", options: ["Converging lens", "Convex lens", "Concave lens", "Biconvex lens"], answer: 2, exp: "Concave lenses diverge light rays." },
            { q: "The center of a lens is called the:", options: ["Pole", "Optical Center (C)", "Principal Focus", "Aperture"], answer: 1, exp: "Rays passing through the optical center do not bend." },
            { q: "A convex lens is also known as a ____ lens:", options: ["Diverging", "Converging", "Reflecting", "Plane"], answer: 1, exp: "It brings parallel rays together to a focal point." },
            { q: "A concave lens is also known as a ____ lens:", options: ["Diverging", "Converging", "Magnifying", "Real"], answer: 0, exp: "It spreads light rays apart." },
            { q: "The power of a lens is the reciprocal of its ____ in meters:", options: ["Radius", "Aperture", "Focal length", "Object distance"], answer: 2, exp: "P = 1 / f (in meters)." },
            { q: "The SI unit of power of a lens is:", options: ["Hertz", "Dioptre (D)", "Watt", "Newton"], answer: 1, exp: "1 Dioptre = 1 m⁻¹." },
            { q: "A convex lens has a focal length of 0.5m. Its power is:", options: ["+2 D", "-2 D", "+0.5 D", "+5 D"], answer: 0, exp: "P = 1 / 0.5 = +2 D." },
            { q: "The power of a concave lens is always:", options: ["Positive", "Negative", "Zero", "Variable"], answer: 1, exp: "Since 'f' is negative for concave lenses, 'P' is also negative." },
            { q: "An object at 2F of a convex lens forms an image at:", options: ["F", "2F", "Infinity", "Optical Center"], answer: 1, exp: "The image is real, inverted, and same size." },
            { q: "If an object is placed very close to a convex lens (between F and C), the image is:", options: ["Real and inverted", "Virtual, upright, and magnified", "Real and diminished", "Virtual and diminished"], answer: 1, exp: "This is how a simple magnifying glass works." },
            { q: "A concave lens always forms a ____ image:", options: ["Real, inverted, magnified", "Virtual, upright, diminished", "Real, inverted, diminished", "Virtual, inverted, magnified"], answer: 1, exp: "Concave lenses never form real images." }
        ],
        "12.6 Optical Instruments": [
            { q: "A simple microscope consists of a single:", options: ["Concave lens", "Convex lens", "Concave mirror", "Prism"], answer: 1, exp: "A short focal length convex lens acts as a magnifying glass." },
            { q: "The magnifying power of a simple microscope is M =:", options: ["D / f", "1 + D / f", "f / D", "1 - D / f"], answer: 1, exp: "D is the near point (25cm)." },
            { q: "The compound microscope uses ____ convex lenses:", options: ["One", "Two", "Three", "Four"], answer: 1, exp: "It uses an Objective lens and an Eyepiece." },
            { q: "In a compound microscope, the focal length of the objective is ____ than the eyepiece:", options: ["Larger", "Smaller", "Equal", "Double"], answer: 1, exp: "The objective has a very short focal length to capture detail from small objects." },
            { q: "The astronomical telescope uses two convex lenses to see:", options: ["Bacteria", "Distant objects", "Atoms", "Internal organs"], answer: 1, exp: "It magnifies angular size of stars and planets." },
            { q: "In a telescope, the objective lens has a ____ focal length:", options: ["Small", "Large", "Negative", "Variable"], answer: 1, exp: "A large focal length objective lens collects more light from distant stars." },
            { q: "The magnifying power of a telescope is M =:", options: ["fo / fe", "fe / fo", "fo + fe", "1 + fo/fe"], answer: 0, exp: "Ratio of focal length of objective to eyepiece." },
            { q: "The human eye acts like a:", options: ["Mirror", "Camera", "Telescope", "Microscope"], answer: 1, exp: "It has a lens, an aperture (pupil), and a light-sensitive screen (retina)." },
            { q: "The image formed on the retina of the human eye is:", options: ["Virtual and upright", "Real and inverted", "Virtual and diminished", "Real and upright"], answer: 1, exp: "The brain flips the inverted image so we perceive it as upright." },
            { q: "The screen of the eye where images are formed is the:", options: ["Iris", "Pupil", "Retina", "Cornea"], answer: 2, exp: "The retina contains photoreceptors (rods and cones)." },
            { q: "The ability of the eye to change its focal length is called:", options: ["Reflection", "Refraction", "Accommodation", "Persistence"], answer: 2, exp: "Ciliary muscles change the lens shape to focus on near or far objects." },
            { q: "For a normal human eye, the near point distance is:", options: ["10 cm", "25 cm", "50 cm", "Infinite"], answer: 1, exp: "This is the minimum distance for clear vision without strain." },
            { q: "The far point for a normal eye is at:", options: ["25 cm", "100 cm", "Infinity", "10 km"], answer: 2, exp: "A healthy eye can focus on stars at infinite distance." }
        ],
        "12.7 Defects of Vision": [
            { q: "Nearsightedness is also called:", options: ["Hyperopia", "Myopia", "Astigmatism", "Presbyopia"], answer: 1, exp: "Myopic people can see near objects clearly but distant objects are blurry." },
            { q: "In Myopia, the image is formed ____ the retina:", options: ["On", "Behind", "In front of", "At the blind spot"], answer: 2, exp: "The eyeball is too long or the lens is too curved." },
            { q: "Myopia is corrected using a:", options: ["Convex lens", "Concave lens", "Cylindrical lens", "Bifocal lens"], answer: 1, exp: "A diverging (concave) lens spreads the rays before they hit the eye lens." },
            { q: "Farsightedness is also called:", options: ["Myopia", "Hyperopia", "Cataract", "Glaucoma"], answer: 1, exp: "Hyperopic people see distant objects clearly but struggle with near ones." },
            { q: "In Hyperopia, the image is formed ____ the retina:", options: ["In front of", "Behind", "On", "Below"], answer: 1, exp: "The eyeball is too short or the lens is too thin." },
            { q: "Hyperopia is corrected using a:", options: ["Concave lens", "Convex lens", "Plane mirror", "Prism"], answer: 1, exp: "A converging (convex) lens helps focus the rays onto the retina." },
            { q: "With age, the eye lens loses flexibility, leading to:", options: ["Myopia", "Presbyopia", "Color blindness", "Night blindness"], answer: 1, exp: "This is 'old-age sight' where near vision fails." }
        ],
        "12.8 Mixed Physics Review": [
            { q: "Which color of light travels fastest in glass?", options: ["Red", "Violet", "Blue", "Green"], answer: 0, exp: "Red light has the longest wavelength and is refracted the least." },
            { q: "Dispersion of light is the splitting of white light into:", options: ["3 colors", "5 colors", "7 colors", "10 colors"], answer: 2, exp: "VIBGYOR (Violet, Indigo, Blue, Green, Yellow, Orange, Red)." },
            { q: "A prism splits white light because different colors have different:", options: ["Amplitudes", "Velocities in glass", "Intensities", "Weights"], answer: 1, exp: "Refractive index varies slightly with wavelength." },
            { q: "Light travels in straight lines; this property is:", options: ["Refraction", "Rectilinear propagation", "Diffraction", "Reflection"], answer: 1, exp: "This is the basis of 'ray' optics." },
            { q: "A 'Ray' of light is represented by a line with an:", options: ["X", "Arrow", "Dot", "Circle"], answer: 1, exp: "The arrow indicates the direction of energy flow." },
            { q: "Two parallel rays of light meet at:", options: ["The Pole", "The Center", "Infinity", "The Focus"], answer: 2, exp: "By definition, parallel lines meet at infinity." },
            { q: "The focal length of a plane mirror is:", options: ["Zero", "10 cm", "Infinite", "Negative"], answer: 2, exp: "Since it doesn't converge or diverge light, its 'focus' is at infinity." },
            { q: "Which lens is used in a magnifying glass?", options: ["Concave", "Convex", "Bifocal", "Plano-concave"], answer: 1, exp: "Convex lens forms a virtual magnified image when object is within 'f'." },
            { q: "The refractive index has ____ unit:", options: ["m/s", "Degrees", "No unit", "Dioptres"], answer: 2, exp: "It is a ratio of two similar quantities (speeds or sines)." },
            { q: "The image formed by a convex mirror is always:", options: ["Real", "Inverted", "Virtual and diminished", "Magnified"], answer: 2, exp: "Convex mirrors always produce small, upright, virtual images." },
            { q: "Periscopes in submarines use:", options: ["Convex lenses", "Prisms or mirrors", "Concave mirrors", "Fiber optics"], answer: 1, exp: "They allow seeing objects above water level via two 45° reflections." },
            { q: "Total internal reflection can only happen if ∠i is:", options: ["< Critical angle", "= Critical angle", "> Critical angle", "0"], answer: 2, exp: "Beyond the critical angle, all light reflects back." },
            { q: "A concave mirror can form a real image. True or False?", options: ["True", "False"], answer: 0, exp: "Yes, if the object is beyond the focal point." },
            { q: "The size of the image in a plane mirror is ____ the object:", options: ["Smaller than", "Larger than", "Same as", "Varying"], answer: 2, exp: "Magnification is exactly 1." },
            { q: "The focal length of a lens depends on:", options: ["Color of light", "Curvature of surfaces", "Material of lens", "All of these"], answer: 3, exp: "f is affected by the Lens Maker's variables." },
            { q: "The speed of light in water is approx:", options: ["3 x 10^8 m/s", "2.25 x 10^8 m/s", "1.5 x 10^8 m/s", "340 m/s"], answer: 1, exp: "v = c / n = 3e8 / 1.33 ≈ 2.25e8 m/s." },
            { q: "A burning glass is actually a:", options: ["Concave lens", "Convex lens", "Plane mirror", "Glass slab"], answer: 1, exp: "It converges sunrays to a point to generate heat." },
            { q: "Shadows are formed because light:", options: ["Reflects", "Travels in straight lines", "Refracts", "Is a wave"], answer: 1, exp: "Light cannot bend around large opaque objects easily." },
            { q: "Which instrument is used to see very small objects like cells?", options: ["Telescope", "Compound Microscope", "Binoculars", "Camera"], answer: 1, exp: "Compound microscopes provide high magnification." },
            { q: "Light is a form of ____ energy:", options: ["Chemical", "Mechanical", "Electromagnetic", "Potential"], answer: 2, exp: "It consists of oscillating electric and magnetic fields." },
            { q: "The critical angle for glass (n=1.5) is approximately:", options: ["42°", "49°", "24°", "90°"], answer: 0, exp: "sin(c) = 1/1.5 ≈ 0.67, which is sin(41.8°)." },
            { q: "The critical angle for water is approximately:", options: ["42°", "49°", "24°", "90°"], answer: 1, exp: "sin(c) = 1/1.33 ≈ 0.75, which is sin(48.6°)." },
            { q: "The speed of light is ____ in air than in water:", options: ["Slower", "Faster", "Same", "Zero"], answer: 1, exp: "Air is less dense than water." },
            { q: "In a camera, the lens forms a ____ image on the film/sensor:", options: ["Real, inverted, diminished", "Virtual, upright, magnified", "Real, upright, same size", "Virtual, inverted, diminished"], answer: 0, exp: "Cameras must form real images to record them." },
            { q: "Rainbows are caused by ____ of sunlight in raindrops:", options: ["Reflection", "Refraction and Dispersion", "Total Internal Reflection", "All of these"], answer: 3, exp: "A combination of refraction, dispersion, and internal reflection creates the arc." },
            { q: "A convex lens is thicker at:", options: ["Edges", "Middle", "Bottom", "Nowhere"], answer: 1, exp: "Definition of a converging lens shape." },
            { q: "To get a real image of the same size with a convex lens, p =:", options: ["f", "2f", "Infinity", "0.5f"], answer: 1, exp: "Object at 2F gives image at 2F." },
            { q: "The image of a distant star in a telescope is formed at:", options: ["C", "F", "2F", "Between F and C"], answer: 1, exp: "Parallel rays from infinity meet at the focal plane." },
            { q: "The focus of a concave lens is:", options: ["Real", "Virtual", "At C", "Positive"], answer: 1, exp: "Rays appear to come from it but don't actually cross there." },
            { q: "What happens to the focal length of a lens if it is submerged in water?", options: ["Increases", "Decreases", "Stays same", "Becomes zero"], answer: 0, exp: "The difference in refractive index is smaller, so light bends less, making 'f' longer." },
            { q: "Concave mirrors are used by dentists to see:", options: ["Far away teeth", "Magnified images of teeth", "Diminished teeth", "Virtual images only"], answer: 1, exp: "When close to the tooth, it provides an upright, large image." },
            { q: "A ray of light strikes a mirror at 30° to the normal. The angle between incident and reflected ray is:", options: ["30°", "60°", "90°", "0°"], answer: 1, exp: "∠i = 30, ∠r = 30. Total angle = 30 + 30 = 60°." },
            { q: "If a ray strikes a mirror normally (along the normal), the angle of reflection is:", options: ["0°", "90°", "180°", "45°"], answer: 0, exp: "The ray reflects back along the same path." },
            { q: "Refractive index of a glass slab is 1.5. Speed of light in it is:", options: ["3x10^8", "2x10^8", "1.5x10^8", "4.5x10^8"], answer: 1, exp: "v = 3e8 / 1.5 = 2e8 m/s." },
            { q: "A lens with power +4D has a focal length of:", options: ["4m", "0.25m", "1m", "40cm"], answer: 1, exp: "f = 1/P = 1/4 = 0.25m or 25cm." },
            { q: "A lens with power -5D is a:", options: ["Convex lens", "Concave lens", "Plane glass", "Bifocal"], answer: 1, exp: "Negative power = Diverging lens." },
            { q: "Magnification (m) is the ratio of image height to:", options: ["Object distance", "Object height", "Focal length", "Radius"], answer: 1, exp: "m = h_i / h_o." },
            { q: "Magnification (m) is also equal to the ratio of:", options: ["q / p", "p / q", "f / p", "f / q"], answer: 0, exp: "m = q / p (image distance / object distance)." },
            { q: "If magnification is less than 1, the image is:", options: ["Magnified", "Diminished", "Same size", "Virtual"], answer: 1, exp: "The image is smaller than the object." },
            { q: "If magnification is negative, the image is:", options: ["Real and inverted", "Virtual and upright", "Upright and magnified", "Diminished"], answer: 0, exp: "Negative 'm' implies a real image (inverted)." }
        ]
    }
},
           "13": {
    title: "Electrostatics",
    topics: {
      "13.1 Production of Charges": [
        { q: "The study of electric charges at rest is called:", options: ["Electrodynamics", "Electrostatics", "Electromagnetism", "Electronics"], answer: 1, exp: "By definition, 'electro' refers to charge and 'statics' refers to rest." },
        { q: "Which of the following particles has a positive charge?", options: ["Electron", "Neutron", "Proton", "Photon"], answer: 2, exp: "Protons carry a positive charge, electrons negative, and neutrons are neutral." },
        { q: "When a glass rod is rubbed with silk, the rod acquires:", options: ["Negative charge", "Positive charge", "No charge", "Magnetic charge"], answer: 1, exp: "Electrons move from the glass to the silk, leaving the rod with a positive charge." },
        { q: "A plastic rod rubbed with fur becomes negatively charged because it:", options: ["Gains protons", "Gains electrons", "Loses electrons", "Loses protons"], answer: 1, exp: "The plastic rod pulls electrons from the fur due to its higher electron affinity." },
        { q: "Like charges always ____ each other:", options: ["Attract", "Repel", "Neutralize", "Rotate"], answer: 1, exp: "Fundamental law: similar charges exert a repulsive force on each other." },
        { q: "Unlike charges always ____ each other:", options: ["Repel", "Attract", "Reflect", "Ignore"], answer: 1, exp: "Fundamental law: opposite charges exert an attractive force on each other." },
        { q: "The SI unit of charge is:", options: ["Ampere", "Volt", "Coulomb", "Ohm"], answer: 2, exp: "The Coulomb (C) is the standard SI unit for measuring electric charge." },
        { q: "An object becomes positively charged by:", options: ["Losing electrons", "Gaining electrons", "Gaining neutrons", "Losing protons"], answer: 0, exp: "Charging involves electron transfer; losing negative electrons leaves a net positive charge." },
        { q: "The neutral particle in an atom is the:", options: ["Electron", "Proton", "Positron", "Neutron"], answer: 3, exp: "Neutrons reside in the nucleus and have no net electrical charge." },
        { q: "Electrostatic induction involves:", options: ["Physical contact", "Rubbing", "Bringing a charged body near a neutral one", "Heating"], answer: 2, exp: "Induction is a non-contact method of redistributing charge in a conductor." }
      ],
      "13.2 Gold Leaf Electroscope": [
        { q: "A gold leaf electroscope is used to:", options: ["Measure current", "Detect presence of charge", "Produce electricity", "Measure resistance"], answer: 1, exp: "Its primary purpose is to detect the presence and nature of electric charge." },
        { q: "If a charged body is brought near a neutral electroscope, the leaves:", options: ["Collapse", "Diverge", "Stay still", "Melt"], answer: 1, exp: "The charge induces repulsion in the gold leaves, causing them to spread apart (diverge)." },
        { q: "To detect the nature of charge (positive or negative), the electroscope must be:", options: ["Neutral", "Already charged", "Earthed", "Disconnected"], answer: 1, exp: "To identify the type of charge, we observe if the leaves diverge further or collapse on a pre-charged device." },
        { q: "The leaves of an electroscope are usually made of gold because gold is:", options: ["Cheap", "Extremely malleable and conductive", "Magnetic", "Heavy"], answer: 1, exp: "Gold can be beaten into very thin, light leaves that are highly sensitive to small charges." },
        { q: "If the leaves of a positively charged electroscope diverge further, the body brought near is:", options: ["Negative", "Positive", "Neutral", "Magnetic"], answer: 1, exp: "Bringing a positive body near pushes more positive charge to the leaves, increasing repulsion." }
      ],
      "13.3 Coulomb's Law": [
        { q: "Coulomb's law is mathematically expressed as:", options: ["F = k q1 q2 / r", "F = k q1 q2 / r²", "F = m a", "F = q E"], answer: 1, exp: "Electrostatic force follows the inverse-square law ($F = k q_1 q_2 / r^2$)." },
        { q: "The value of Coulomb's constant 'k' in vacuum is:", options: ["9 x 10^9 Nm²/C²", "1.6 x 10^-19 Nm²/C²", "8.85 x 10^-12 Nm²/C²", "3 x 10^8 Nm²/C²"], answer: 0, exp: "This is the constant used for force calculations in air or vacuum ($9 \times 10^9 \\text{ Nm}^2/\\text{C}^2$)." },
        { q: "If the distance between two charges is doubled, the force becomes:", options: ["Double", "Half", "One-fourth", "Four times"], answer: 2, exp: "Since $F \propto 1/r^2$, doubling the distance ($2^2$) reduces force to $1/4$." },
        { q: "Coulomb's force is a ____ force:", options: ["Short range", "Contact", "Mutual", "Frictional"], answer: 2, exp: "Both charges exert equal and opposite forces on each other (Newton's 3rd Law)." },
        { q: "The force between two charges depends on:", options: ["Magnitude of charges", "Distance between charges", "Medium between charges", "All of these"], answer: 3, exp: "F is determined by the product of charges, distance squared, and the permittivity of the medium." },
        { q: "If one of the charges is doubled, the Coulomb force becomes:", options: ["Double", "Half", "Four times", "Constant"], answer: 0, exp: "Force is directly proportional to the magnitude of the product of the charges ($F \propto q$)." }
      ],
      "13.4 Electric Field & Intensity": [
        { q: "The region around a charge where it exerts force on other charges is:", options: ["Magnetic field", "Electric field", "Gravitational field", "Nuclear field"], answer: 1, exp: "The field is the space where electrostatic interaction can be detected." },
        { q: "Electric field lines always start from ____ and end at ____:", options: ["Negative, Positive", "Positive, Negative", "Center, Surface", "Infinity, Zero"], answer: 1, exp: "By convention, field lines originate from positive charges and terminate on negative charges." },
        { q: "Electric field intensity (E) is defined as:", options: ["F / q", "F * q", "q / F", "1 / F"], answer: 0, exp: "Intensity is the force experienced per unit test charge ($E = F/q$)." },
        { q: "The SI unit of electric field intensity is:", options: ["Coulomb/Newton", "Newton/Coulomb", "Volt", "Ampere"], answer: 1, exp: "Derived from $F/q$, where force is in Newtons and charge in Coulombs." },
        { q: "Electric field lines ____ each other:", options: ["Always cross", "Never cross", "Are parallel only", "Are circular"], answer: 1, exp: "Lines never cross because the field has only one direction at any given point." },
        { q: "A stronger electric field is represented by lines that are:", options: ["Far apart", "Closer together", "Dotted", "Straight"], answer: 1, exp: "The density of field lines indicates the relative strength of the electric field." },
        { q: "Electric field intensity is a ____ quantity:", options: ["Scalar", "Vector", "Dimensionless", "Base"], answer: 1, exp: "It has both magnitude and direction (the direction of force on a positive test charge)." }
      ],
      "13.5 Electrostatic Potential": [
        { q: "The work done in bringing a unit positive charge from infinity to a point is:", options: ["Electric intensity", "Electric potential", "Capacitance", "Resistance"], answer: 1, exp: "Potential is defined as the electrical potential energy per unit charge ($V = W/q$)." },
        { q: "The SI unit of electric potential is:", options: ["Coulomb", "Joule", "Volt", "Ohm"], answer: 2, exp: "Potential is measured in Volts (V), named after Alessandro Volta." },
        { q: "One Volt is equal to:", options: ["1 J/C", "1 C/J", "1 N/C", "1 J/s"], answer: 0, exp: "A Volt is the ratio of work (Joule) to charge (Coulomb): $1\\text{V} = 1\\text{J}/1\\text{C}$." },
        { q: "Potential difference is measured by a device called:", options: ["Ammeter", "Galvanometer", "Voltmeter", "Thermometer"], answer: 2, exp: "Voltmeters are connected in parallel to measure potential drop between two points." },
        { q: "Electric potential is a ____ quantity:", options: ["Scalar", "Vector", "Fundamental", "Negative"], answer: 0, exp: "Potential depends on work and charge, both of which are scalar quantities." }
      ],
      "13.6 Capacitors & Capacitance": [
        { q: "A device used to store electric charge is called:", options: ["Resistor", "Inductor", "Capacitor", "Transistor"], answer: 2, exp: "Capacitors store energy in the form of an electric field between two plates." },
        { q: "The ability of a capacitor to store charge is called:", options: ["Resistance", "Conductance", "Capacitance", "Inductance"], answer: 2, exp: "Capacitance measures the 'capacity' to hold charge for a given voltage." },
        { q: "Capacitance (C) is defined by the formula:", options: ["C = Q V", "C = Q / V", "C = V / Q", "C = 1 / Q V"], answer: 1, exp: "Capacitance is the ratio of charge to potential difference ($C = Q/V$)." },
        { q: "The SI unit of capacitance is:", options: ["Henry", "Farad", "Coulomb", "Tesla"], answer: 1, exp: "The Farad (F) is the unit of capacitance; named after Michael Faraday." },
        { q: "If 1 Coulomb of charge creates 1 Volt of potential, capacitance is:", options: ["1 Henry", "1 Farad", "1 Ohm", "1 Watt"], answer: 1, exp: "By definition, $C = Q/V = 1\\text{C}/1\\text{V} = 1\\text{F}$." },
        { q: "The insulating material between the plates of a capacitor is called:", options: ["Conductor", "Dielectric", "Electrolyte", "Semiconductor"], answer: 1, exp: "Dielectrics increase the capacitance by reducing the internal electric field." },
        { q: "Capacitance increases if the area of the plates ____:", options: ["Decreases", "Increases", "Stays same", "Is removed"], answer: 1, exp: "Capacitance is directly proportional to the surface area of the plates ($C \propto A$)." },
        { q: "Capacitance increases if the distance between plates ____:", options: ["Increases", "Decreases", "Stays same", "Is doubled"], answer: 1, exp: "Capacitance is inversely proportional to the plate separation ($C \propto 1/d$)." },
        { q: "In series combination of capacitors, each capacitor has the same ____:", options: ["Voltage", "Charge", "Capacitance", "Energy"], answer: 1, exp: "Charge remains the same in series as there is only one path for the flow of electrons." },
        { q: "In parallel combination of capacitors, each capacitor has the same ____:", options: ["Charge", "Voltage", "Energy", "Size"], answer: 1, exp: "In parallel, all components share the same connection points to the voltage source." },
        { q: "Equivalent capacitance (Ceq) in parallel is:", options: ["C1 + C2 + ...", "1/C1 + 1/C2 + ...", "C1 * C2", "C1 - C2"], answer: 0, exp: "Parallel capacitance is calculated by the direct sum of individual capacitances." },
        { q: "A capacitor that allows its capacitance to be changed is a:", options: ["Fixed capacitor", "Variable capacitor", "Electrolytic capacitor", "Paper capacitor"], answer: 1, exp: "Variable capacitors allow adjustment, usually by changing the overlapping plate area." },
        { q: "Electrolytic capacitors are used to store ____ amounts of charge:", options: ["Very small", "Large", "Zero", "Negative"], answer: 1, exp: "Their chemical dielectric layer allows for high capacitance values in compact sizes." }
      ],
      "13.7 Applications & Hazards": [
        { q: "Electrostatic air cleaners work by:", options: ["Heating air", "Charging dust particles", "Using magnets", "Using water"], answer: 1, exp: "They charge pollutants so they are attracted to oppositely charged collection plates." },
        { q: "In a photocopier, the drum is made of a light-sensitive material called:", options: ["Aluminum", "Selenium", "Copper", "Iron"], answer: 1, exp: "Selenium is a photoconductor that holds charge in the dark and conducts in the light." },
        { q: "A lightning conductor protects buildings by providing a path to:", options: ["The sky", "The ground", "The battery", "The water tank"], answer: 1, exp: "It directs the massive current of a lightning strike safely into the Earth." },
        { q: "The spark produced by rubbing feet on a carpet is an example of:", options: ["Current electricity", "Electrostatic discharge", "Magnetism", "Resonance"], answer: 1, exp: "This is the sudden flow of static electricity between two objects." },
        { q: "Fires in oil tankers can be caused by static electricity produced by:", options: ["The engine", "Friction of oil with pipes", "The sun", "The driver"], answer: 1, exp: "Fluid friction during transport can generate dangerous levels of static charge." },
        { q: "To prevent sparks, petrol trucks carry a ____ touching the ground:", options: ["Rubber hose", "Metal chain", "Wooden stick", "Plastic flag"], answer: 1, exp: "Metal chains provide a conductive path to ground to discharge static buildup." },
        { q: "A lightning bolt is a massive ____:", options: ["Chemical reaction", "Electrostatic discharge", "Nuclear explosion", "Sound wave"], answer: 1, exp: "It is the rapid neutralization of charge built up between the cloud and the ground." }
      ],
      "13.8 Mixed Review": [
        { q: "Which of the following is an insulator?", options: ["Copper", "Silver", "Glass", "Aluminum"], answer: 2, exp: "Insulators like glass have tightly bound electrons and do not conduct electricity." },
        { q: "The charge on an electron is:", options: ["1.6 x 10^-19 C", "-1.6 x 10^-19 C", "9 x 10^9 C", "1 C"], answer: 1, exp: "The elementary charge of an electron is approximately $-1.6 \times 10^{-19} \\text{ C}$." },
        { q: "How many electrons make up 1 Coulomb of charge?", options: ["1.6 x 10^19", "6.25 x 10^18", "1", "9 x 10^9"], answer: 1, exp: "Calculated as $n = Q/e = 1 / (1.6 \times 10^{-19}) \approx 6.25 \times 10^{18}$." },
        { q: "One microFarad (μF) is equal to:", options: ["10^-3 F", "10^-6 F", "10^-9 F", "10^-12 F"], answer: 1, exp: "Micro $(\mu)$ denotes a factor of $10^{-6}$." },
        { q: "The space between capacitor plates is filled with a dielectric to ____ capacitance:", options: ["Decrease", "Increase", "Keep constant", "Zero"], answer: 1, exp: "Dielectrics reduce the potential difference for a given charge, increasing $C$." },
        { q: "If C1=2F and C2=3F are in parallel, Ceq is:", options: ["5F", "1.2F", "6F", "1F"], answer: 0, exp: "$C_{eq} = C_1 + C_2 = 2\\text{F} + 3\\text{F} = 5\\text{F}$." },
        { q: "If C1=2F and C2=2F are in series, Ceq is:", options: ["4F", "1F", "0.5F", "2F"], answer: 1, exp: "$1/C_{eq} = 1/2 + 1/2 = 1$, so $C_{eq} = 1\\text{F}$." },
        { q: "Potential at a point is 10V. If 2C charge is moved, work done is:", options: ["5 J", "20 J", "12 J", "0.2 J"], answer: 1, exp: "Work done $W = Q \times V = 2\\text{C} \times 10\\text{V} = 20\\text{J}$." },
        { q: "Electric field lines of a negative point charge point ____:", options: ["Outward", "Inward", "Circular", "None"], answer: 1, exp: "By convention, field lines point toward the sink (negative charge)." },
        { q: "Which property is used in electrostatic spray painting?", options: ["Magnetic attraction", "Like charges repel", "Unlike charges attract", "Refraction"], answer: 2, exp: "The atomized paint particles are attracted to the oppositely charged object." },
        { q: "A capacitor blocks ____ but allows ____ (in high frequency):", options: ["AC, DC", "DC, AC", "Voltage, Current", "None"], answer: 1, exp: "Capacitors act as open circuits for DC and frequency-dependent paths for AC." },
        { q: "Energy stored in a capacitor is in the form of:", options: ["Heat", "Magnetic field", "Electric field", "Kinetic energy"], answer: 2, exp: "Energy is stored in the electric field created between the oppositely charged plates." },
        { q: "The symbol for a variable capacitor has a/an ____ across it:", options: ["Circle", "Arrow", "Cross", "Dot"], answer: 1, exp: "An arrow symbol indicates that the component value can be adjusted." },
        { q: "An electric dipole consists of:", options: ["Two like charges", "Two equal and opposite charges", "One charge", "Three charges"], answer: 1, exp: "A dipole is defined as two equal and opposite charges separated by a distance." },
        { q: "If distance between plates of a capacitor is halved, capacitance:", options: ["Halves", "Doubles", "Remains same", "Four times"], answer: 1, exp: "Since $C \propto 1/d$, reducing distance to $0.5d$ results in $2C$." },
        { q: "Paper capacitors are examples of:", options: ["Fixed capacitors", "Variable capacitors", "Resistors", "Batteries"], answer: 0, exp: "Standard paper capacitors have a constant, non-adjustable capacitance value." },
        { q: "Earthing a body means connecting it to:", options: ["A battery", "The ground", "A magnet", "Another charged body"], answer: 1, exp: "Connecting to the ground allows excess charges to be neutralized by the Earth." },
        { q: "The net charge on a neutral atom is:", options: ["Positive", "Negative", "Zero", "Variable"], answer: 2, exp: "Neutral atoms have an equal number of positive protons and negative electrons." },
        { q: "Work done per unit charge is the definition of:", options: ["Intensity", "Current", "Potential", "Power"], answer: 2, exp: "This is the definition of electrostatic potential ($V = W/q$)." },
        { q: "If a dielectric is removed from a charged isolated capacitor, voltage:", options: ["Increases", "Decreases", "Stays same", "Becomes zero"], answer: 0, exp: "Removing the dielectric lowers the capacitance ($C$), causing the voltage ($V = Q/C$) to rise." },
        { q: "Two similar charges 'q' at distance 'd' have force 'F'. If 'd' is tripled, force is:", options: ["3F", "9F", "F/3", "F/9"], answer: 3, exp: "By the inverse square law ($1/3^2$), the force becomes $1/9$ of its original value." },
        { q: "Electrostatic force is much ____ than gravitational force:", options: ["Weaker", "Stronger", "Equal", "Irrelevant"], answer: 1, exp: "The electric force between elementary particles is orders of magnitude stronger than gravity." },
        { q: "The force between two 1C charges separated by 1m in vacuum is:", options: ["1 N", "9 x 10^9 N", "1.6 x 10^-19 N", "Zero"], answer: 1, exp: "Substituting into Coulomb's Law: $F = k(1)(1)/1^2 = 9 \times 10^9 \\text{ N}$." },
        { q: "Metals are good conductors because they have many ____:", options: ["Protons", "Free electrons", "Bound electrons", "Neutrons"], answer: 1, exp: "The presence of 'delocalized' or free electrons allows charge to flow through metals." },
        { q: "Which of the following is not a unit of energy?", options: ["Joule", "Electron-Volt", "Watt-second", "Volt/Coulomb"], answer: 3, exp: "Volt/Coulomb is a unit of Electric Field Strength ($V/m$) or force per charge; others are units of work/energy." },
        { q: "The direction of electric field intensity is the direction of force on a:", options: ["Negative test charge", "Positive test charge", "Neutron", "Electron"], answer: 1, exp: "By standard convention, the field vector points in the direction a positive charge would move." },
        { q: "Capacitor plates are usually made of:", options: ["Wood", "Plastic", "Metal foils", "Glass"], answer: 2, exp: "Highly conductive metal foils (like aluminum) are used for the capacitor's plates." },
        { q: "A 10μF capacitor stores 50μC charge. The voltage is:", options: ["500V", "5V", "0.2V", "50V"], answer: 1, exp: "$V = Q/C = 50\\mu \\text{C} / 10\\mu \\text{F} = 5\\text{V}$." },
        { q: "Three 3μF capacitors in series have Ceq of:", options: ["9μF", "3μF", "1μF", "0.33μF"], answer: 2, exp: "$1/C_{eq} = 1/3 + 1/3 + 1/3 = 1$, therefore $C_{eq} = 1\\mu \\text{F}$." },
        { q: "An atom that loses an electron becomes a/an:", options: ["Isotope", "Positive ion", "Negative ion", "Molecule"], answer: 1, exp: "Since electrons are negative, losing one leaves the atom with more protons than electrons (positive charge)." }
      ]
    }
  },
            "14": {
    title: "Current Electricity",
    topics: {
      "14.1 Electric Current & Measurement": [
        { q: "The rate of flow of electric charge through any cross-section is called:", options: ["Electric Potential", "Electric Current", "Resistance", "Capacitance"], answer: 1, exp: "Current (I) is defined as the amount of charge (Q) passing through a point per unit time (t)." },
        { q: "The mathematical relation for electric current is:", options: ["I = Q / t", "I = Q x t", "I = V / R", "Both A and C"], answer: 3, exp: "I = Q/t is the basic definition, while I = V/R is the relationship derived from Ohm's Law." },
        { q: "The SI unit of electric current is:", options: ["Volt", "Ohm", "Ampere", "Coulomb"], answer: 2, exp: "The Ampere (A) is the base SI unit for current, equivalent to one Coulomb per second." },
        { q: "If 1 Coulomb of charge passes through a conductor in 1 second, the current is:", options: ["1 Ampere", "1 Volt", "1 Watt", "1 Ohm"], answer: 0, exp: "By the formula I = Q/t, 1C / 1s = 1 Ampere." },
        { q: "Current is a ____ quantity:", options: ["Scalar", "Vector", "Base", "Both A and C"], answer: 3, exp: "Current is one of the seven SI base quantities and is a scalar because it does not obey vector addition laws." },
        { q: "In liquids and gases, the current is due to the motion of:", options: ["Electrons only", "Protons only", "Both positive and negative ions", "Neutrons"], answer: 2, exp: "In electrolytes and ionized gases, both positive and negative ions act as charge carriers." },
        { q: "In metals, the current is produced only by the flow of:", options: ["Protons", "Free electrons", "Positive ions", "Neutrons"], answer: 1, exp: "Metals have a 'sea' of delocalized free electrons that carry charge through the lattice." },
        { q: "The direction of current from higher potential to lower potential is called:", options: ["Electronic current", "Conventional current", "Static current", "Induced current"], answer: 1, exp: "Conventional current is defined as the flow of positive charge from positive to negative terminals." },
        { q: "Electronic current flows from:", options: ["Higher to lower potential", "Lower to higher potential", "Positive to negative terminal", "None"], answer: 1, exp: "Electrons are negative and move from the negative terminal (lower potential) to the positive terminal." },
        { q: "An instrument used to detect the presence of current is:", options: ["Voltmeter", "Galvanometer", "Wattmeter", "Ohmeter"], answer: 1, exp: "A galvanometer is a sensitive instrument used to detect the presence and direction of small currents." },
        { q: "To measure current in a circuit, an ammeter is always connected in:", options: ["Parallel", "Series", "Randomly", "None"], answer: 1, exp: "An ammeter must be in series to ensure the full current of the branch flows through it." },
        { q: "The resistance of an ideal ammeter should be:", options: ["Very high", "Moderate", "Very low (zero)", "Infinite"], answer: 2, exp: "Ideal ammeters have zero resistance to avoid dropping any voltage or changing the circuit's total resistance." }
      ],
      "14.2 Potential Difference & EMF": [
        { q: "The energy supplied by a unit charge as it moves from one point to another is:", options: ["EMF", "Potential Difference", "Current", "Power"], answer: 1, exp: "Potential difference is the work done per unit charge as it moves between two points in a circuit." },
        { q: "The unit of potential difference is:", options: ["Ampere", "Ohm", "Volt", "Joule"], answer: 2, exp: "The Volt (V) is the SI unit, equivalent to one Joule per Coulomb." },
        { q: "When no current is drawn from a source, the potential difference is called:", options: ["Terminal voltage", "EMF", "Resistance", "Charge"], answer: 1, exp: "EMF (Electromotive Force) is the total potential energy per unit charge provided by the source when the circuit is open." },
        { q: "The energy converted from non-electrical form to electrical form per unit charge is:", options: ["Potential Difference", "EMF", "Current", "Power"], answer: 1, exp: "EMF represents the energy conversion (chemical, mechanical, etc.) into electrical energy within the source." },
        { q: "EMF is measured in:", options: ["Newtons", "Joules", "Volts", "Amperes"], answer: 2, exp: "EMF is a potential difference, so its unit is the Volt." },
        { q: "A voltmeter is used to measure:", options: ["Current", "Potential Difference", "Resistance", "Charge"], answer: 1, exp: "Voltmeters measure the electrical potential difference between two points." },
        { q: "A voltmeter is always connected in ____ with the circuit component:", options: ["Series", "Parallel", "Diagonal", "None"], answer: 1, exp: "Parallel connection allows the voltmeter to sample the potential at two points without drawing significant current." },
        { q: "An ideal voltmeter should have ____ resistance:", options: ["Zero", "Infinite", "Low", "100 Ohms"], answer: 1, exp: "Infinite resistance ensures it doesn't draw any current from the circuit, which would change the measurement." },
        { q: "Potential difference is the measure of ____ between two points:", options: ["Current", "Electrical Energy", "Resistance", "Force"], answer: 1, exp: "It represents the electrical energy transferred to other forms (like heat or light) per unit charge." },
        { q: "The terminal voltage of a battery is ____ its EMF when it is discharging:", options: ["Greater than", "Less than", "Equal to", "Double"], answer: 1, exp: "Due to internal resistance, some voltage is 'lost' inside the battery: V = E - Ir." }
      ],
      "14.3 Ohm's Law & Resistance": [
        { q: "The ratio of potential difference to the current is called:", options: ["Capacitance", "Resistance", "Conductance", "Inductance"], answer: 1, exp: "Resistance (R) is the opposition to current flow, calculated as R = V / I." },
        { q: "The SI unit of resistance is:", options: ["Volt", "Ampere", "Ohm", "Watt"], answer: 2, exp: "The Ohm (Ω) is the unit of resistance." },
        { q: "V = IR represents which law?", options: ["Coulomb's Law", "Ohm's Law", "Joule's Law", "Newton's Law"], answer: 1, exp: "Ohm's Law defines the linear relationship between voltage and current for certain conductors." },
        { q: "The graph between V and I for an Ohmic conductor is a:", options: ["Circle", "Parabola", "Straight line", "Curve"], answer: 2, exp: "A straight line passing through the origin indicates that V is directly proportional to I." },
        { q: "Which of the following is an Ohmic conductor?", options: ["Filament lamp", "Thermistor", "Fixed Resistor", "Semiconductor diode"], answer: 2, exp: "Fixed resistors maintain constant resistance, unlike lamps or diodes which change with heat or voltage." },
        { q: "The resistance of a conductor depends on:", options: ["Length", "Area", "Temperature", "All of these"], answer: 3, exp: "Resistance is affected by physical dimensions (L, A), material properties, and thermal state." },
        { q: "If the length of a wire is doubled, its resistance:", options: ["Halves", "Doubles", "Remains same", "Four times"], answer: 1, exp: "Resistance is directly proportional to length (R ∝ L)." },
        { q: "If the area of cross-section is doubled, the resistance:", options: ["Halves", "Doubles", "Remains same", "Four times"], answer: 0, exp: "Resistance is inversely proportional to cross-sectional area (R ∝ 1/A)." },
        { q: "Specific resistance depends only on the ____ of the conductor:", options: ["Length", "Area", "Material and Temperature", "Weight"], answer: 2, exp: "Resistivity (ρ) is an intrinsic property of the material and changes with temperature." },
        { q: "The unit of resistivity (specific resistance) is:", options: ["Ohm", "Ohm-meter", "Ohm/meter", "Volt"], answer: 1, exp: "From ρ = RA/L, the units are (Ω * m²) / m = Ω·m." },
        { q: "Silver and copper have ____ resistivity:", options: ["High", "Low", "Infinite", "Variable"], answer: 1, exp: "Good conductors have low resistivity, meaning they offer very little opposition to current." },
        { q: "Which material is used in heating elements of heaters?", options: ["Copper", "Iron", "Nichrome", "Silver"], answer: 2, exp: "Nichrome has high resistivity and can withstand high temperatures without oxidizing." }
      ],
      "14.4 Combination of Resistors": [
        { q: "In series combination, the equivalent resistance is:", options: ["Re = R1 + R2", "1/Re = 1/R1 + 1/R2", "Re = R1 x R2", "None"], answer: 0, exp: "In series, total resistance is simply the sum of individual resistances." },
        { q: "In series combination, which quantity remains same?", options: ["Voltage", "Current", "Power", "Resistance"], answer: 1, exp: "There is only one path for charges, so current remains constant throughout the loop." },
        { q: "If two 4 Ohm resistors are in series, the total resistance is:", options: ["2 Ohms", "8 Ohms", "4 Ohms", "16 Ohms"], answer: 1, exp: "Re = 4 + 4 = 8Ω." },
        { q: "In parallel combination, which quantity remains same?", options: ["Voltage", "Current", "Charge", "Resistance"], answer: 0, exp: "All components are connected across the same two potential points." },
        { q: "In parallel combination, the equivalent resistance is ____ than the smallest individual resistance:", options: ["Greater", "Smaller", "Equal", "Double"], answer: 1, exp: "Adding parallel paths always reduces the total equivalent resistance." },
        { q: "If two 4 Ohm resistors are in parallel, the total resistance is:", options: ["2 Ohms", "8 Ohms", "4 Ohms", "1 Ohm"], answer: 0, exp: "1/Re = 1/4 + 1/4 = 2/4 = 1/2. Thus Re = 2Ω." },
        { q: "The equivalent resistance of 'n' equal resistors in series is:", options: ["R/n", "n x R", "n + R", "R^n"], answer: 1, exp: "Re = R + R + ... (n times) = nR." },
        { q: "Domestic wiring is always in:", options: ["Series", "Parallel", "Mixed", "None"], answer: 1, exp: "Parallel wiring ensures that switching off one appliance doesn't turn off others and all get full voltage." }
      ],
      "14.5 Electrical Energy & Joule's Law": [
        { q: "The amount of heat energy generated in a resistor is given by:", options: ["W = I²Rt", "W = VIt", "W = V²t/R", "All of these"], answer: 3, exp: "These are different algebraic forms of the energy equation using Ohm's Law." },
        { q: "Joule's law states that heat energy is proportional to the ____ of current:", options: ["Square", "Cube", "Root", "Inverse"], answer: 0, exp: "The law is expressed as H = I²Rt, where H ∝ I²." },
        { q: "The rate at which energy is dissipated is called:", options: ["Work", "Electric Power", "Voltage", "EMF"], answer: 1, exp: "Power is defined as the rate of doing work or transferring energy (P = W/t)." },
        { q: "The unit of electric power is:", options: ["Joule", "Watt", "Volt", "Ampere"], answer: 1, exp: "The Watt (W) is the SI unit for power, equal to 1 Joule per second." },
        { q: "1 Watt is equal to:", options: ["1 J/s", "1 V x 1 A", "Both A and B", "None"], answer: 2, exp: "Power can be calculated as P = W/t (J/s) or P = VI (V*A)." },

        { q: "1 kWh is equal to:", options: ["3.6 x 10^3 J", "3.6 x 10^6 J", "3.6 MJ", "Both B and C"], answer: 3, exp: "1000W * 3600s = 3,600,000 Joules = 3.6 MJ." },

      "14.6 D.C and A.C": [

        { q: "The source of D.C is:", options: ["Cell", "Battery", "D.C Generator", "All of these"], answer: 3, exp: "All these devices provide a constant polarity output." },
        { q: "A current that changes direction periodically is:", options: ["DC", "AC", "Stable current", "Static current"], answer: 1, exp: "Alternating Current (A.C) reverses its direction at regular intervals." },

      "14.7 Hazards & Safety Devices": [

        { q: "A fuse is always connected in the:", options: ["Live wire", "Neutral wire", "Earth wire", "Any wire"], answer: 0, exp: "The live wire is at high potential; breaking it isolates the appliance from the power source." },
        { q: "A circuit breaker works on the principle of ____ of current:", options: ["Heating effect", "Magnetic effect", "Chemical effect", "Static effect"], answer: 1, exp: "Most circuit breakers use an electromagnet to trip a switch when current becomes too high." },

      "14.8 Side Boxes & Quick Quizzes": [

        { q: "A current of ____ mA can be fatal:", options: ["1 mA", "10 mA", "50-100 mA", "0.1 mA"], answer: 2, exp: "Currents in the range of 50-100mA can cause heart failure (ventricular fibrillation)." },
        { q: "A bird sitting on a single live wire is safe because:", options: ["Its feet are insulated", "No potential difference across its body", "It is very small", "The wire is not live"], answer: 1, exp: "Current requires a difference in potential to flow; since both feet are on the same wire, no current flows through the bird." },

        { q: "Which of the following is a safety device?", options: ["Ammeter", "Voltmeter", "Fuse", "Galvanometer"], answer: 2, exp: "A fuse prevents electrical fires by cutting off excessive current." },

        { q: "Current is the flow of:", options: ["Mass", "Weight", "Charge", "Energy"], answer: 2, exp: "Electric current is specifically the motion of electric charges." },

        { q: "An electric current of 5A flows for 10s. The total charge is:", options: ["0.5 C", "50 C", "2 C", "15 C"], answer: 1, exp: "Q = It = 5 * 10 = 50C." },
