            "15": {
    title: "Electromagnetism",
    topics: {
      "15.1 Magnetic Effect of Steady Current": [
        { q: "The study of magnetic effects of electric current is called:", options: ["Electrostatics", "Electromagnetism", "Electronics", "Mechanics"], answer: 1, exp: "Electromagnetism is the branch of physics involving the study of the electromagnetic force, a type of physical interaction that occurs between electrically charged particles." },
        { q: "Who discovered that a current-carrying wire produces a magnetic field?", options: ["Ampere", "Hans Christian Oersted", "Michael Faraday", "Newton"], answer: 1, exp: "In 1820, Oersted noticed a compass needle deflected when placed near a wire carrying an electric current." },
        { q: "The magnetic field around a straight current-carrying wire is in the form of:", options: ["Straight lines", "Concentric circles", "Ellipses", "Parabolas"], answer: 1, exp: "The field lines form closed circular loops centered on the wire, in a plane perpendicular to the wire." },
        { q: "To find the direction of the magnetic field around a straight wire, we use:", options: ["Left Hand Rule", "Right Hand Grip Rule", "Fleming's Left Hand Rule", "Lenz's Law"], answer: 1, exp: "The Right Hand Grip Rule relates the direction of current to the direction of the magnetic field lines." },
        { q: "According to the Right Hand Grip Rule, the thumb points in the direction of:", options: ["Magnetic Field", "Force", "Current", "Resistance"], answer: 2, exp: "If you grasp the wire with your right hand so the thumb points with the current, your fingers curl in the field's direction." },
        { q: "If the direction of current in a wire is reversed, the magnetic field direction:", options: ["Remains same", "Also reverses", "Becomes zero", "Becomes perpendicular"], answer: 1, exp: "Since the field direction depends directly on current direction, reversing one reverses the other." },
        { q: "A coil of wire consisting of many loops is known as a:", options: ["Capacitor", "Solenoid", "Resistor", "Galvanometer"], answer: 1, exp: "A solenoid is a long coil of wire that acts like a magnet when carrying a current." },
        { q: "The magnetic field inside a solenoid is:", options: ["Zero", "Weak", "Strong and uniform", "Non-uniform"], answer: 2, exp: "Inside the coil, the field lines are parallel, straight, and very close together, indicating a uniform strong field." },
        { q: "The magnetic field of a solenoid resembles the field of a:", options: ["U-shaped magnet", "Bar magnet", "Point charge", "Disc magnet"], answer: 1, exp: "The external field pattern of a solenoid is identical to that of a permanent bar magnet." },
        { q: "The end of the solenoid from which magnetic field lines emerge is called:", options: ["South Pole", "North Pole", "Positive terminal", "Negative terminal"], answer: 1, exp: "By convention, magnetic field lines emerge from the North Pole and enter the South Pole." },
        { q: "The strength of a solenoid's magnetic field can be increased by increasing:", options: ["Number of turns", "Current", "Soft iron core", "All of these"], answer: 3, exp: "Field strength $B \propto nI$ and is further enhanced by the permeability of a soft iron core." },
        { q: "The poles of a solenoid can be determined using:", options: ["Left Hand Rule", "Right Hand Grip Rule for Solenoid", "Lenz's Law", "Ohm's Law"], answer: 1, exp: "If fingers curl with current in the loops, the thumb points toward the North Pole." },
        { q: "The magnetic field produced by the human body is about ____ than Earth's magnetic field:", options: ["One million times weaker", "One hundred times stronger", "Ten times weaker", "Equal"], answer: 0, exp: "Biomagnetism (from the heart and brain) is extremely faint compared to the geomagnetic field." },
        { q: "Magnetism in the human body is mainly due to the flow of ____ along nerve cells:", options: ["Electrons", "Protons", "Ions", "Neutrons"], answer: 2, exp: "Nerve impulses are electrochemical signals involving the movement of ions (like $Na^+$ and $K^+$)." },
        { q: "A compass needle is a small:", options: ["Electromagnet", "Permanent magnet", "Resistor", "Conductor"], answer: 1, exp: "A compass is a balanced permanent magnet that aligns with external magnetic fields." },
        { q: "Magnetic lines of force outside a magnet move from:", options: ["South to North", "North to South", "East to West", "Center to Edge"], answer: 1, exp: "External field lines always loop from the North pole to the South pole." }
      ],
      "15.2 Force on a Current Carrying Conductor": [
        { q: "A current-carrying conductor in a magnetic field experiences a force if it is NOT:", options: ["Perpendicular", "Parallel", "At 45 degrees", "Circular"], answer: 1, exp: "Magnetic force $F = ILB\sin(\theta)$. If parallel ($\theta=0$), $\sin(0)=0$, so force is zero." },
        { q: "The direction of force on a current-carrying wire is determined by:", options: ["Right Hand Grip Rule", "Fleming's Left Hand Rule", "Fleming's Right Hand Rule", "Lenz's Law"], answer: 1, exp: "Fleming's Left Hand Rule is specifically for motor action (force on a conductor)." },
        { q: "In Fleming's Left Hand Rule, the thumb indicates the direction of:", options: ["Current", "Magnetic Field", "Force (Motion)", "Voltage"], answer: 2, exp: "Thumb = Thrust/Force, Forefinger = Field, Middle finger = Current (FBI mnemonic)." },
        { q: "In Fleming's Left Hand Rule, the forefinger represents:", options: ["Current", "Magnetic Field", "Force", "Resistance"], answer: 1, exp: "The First finger (Forefinger) always represents the magnetic Field." },
        { q: "In Fleming's Left Hand Rule, the middle finger represents:", options: ["Force", "Magnetic Field", "Current", "Potential Difference"], answer: 2, exp: "The middle finger represents the conventional current flow." },
        { q: "The magnetic force is maximum when the angle between current and field is:", options: ["0°", "45°", "90°", "180°"], answer: 2, exp: "Force is maximum when current cuts field lines perpendicularly ($\sin(90)=1$)." },
        { q: "The magnetic force is zero when the wire is ____ to the magnetic field:", options: ["Perpendicular", "Parallel", "Diagonal", "None of these"], answer: 1, exp: "Parallel wires do not cut magnetic flux lines, resulting in zero force." },
        { q: "The force on a conductor increases if we increase the:", options: ["Current", "Magnetic field strength", "Length of wire in field", "All of these"], answer: 3, exp: "Force follows the formula $F = BIL\sin(\theta)$, so it's proportional to all three factors." },
        { q: "If current in the wire increases, the force on it in a magnetic field:", options: ["Decreases", "Increases", "Stays same", "Becomes zero"], answer: 1, exp: "Since $F \propto I$, more current generates a stronger interactive force." },
        { q: "Which rule is used to find the magnetic field around a straight wire?", options: ["Left hand rule", "Right hand grip rule", "Lenz's law", "Faraday's law"], answer: 1, exp: "Grip rule is for field direction; Left hand rule is for force direction." }
      ],
      "15.3 D.C Motor & Torque": [
        { q: "A device that converts electrical energy into mechanical energy is:", options: ["Generator", "D.C Motor", "Transformer", "Solenoid"], answer: 1, exp: "A motor uses electricity to produce rotation (mechanical work)." },
        { q: "The turning effect of a force is called:", options: ["Energy", "Power", "Torque", "Momentum"], answer: 2, exp: "Torque is the measure of how much a force acting on an object causes that object to rotate." },
        { q: "In a D.C motor, the torque is produced due to the force on the:", options: ["Brushes", "Commutator", "Armature (Coil)", "Magnets"], answer: 2, exp: "The magnetic field exerts opposite forces on the two sides of the armature coil, creating a couple." },
        { q: "To reverse the direction of current in the coil of a motor, we use:", options: ["Slip rings", "Split rings (Commutator)", "Brushes", "Battery"], answer: 1, exp: "The commutator reverses current every half-turn to keep the coil rotating in the same direction." },
        { q: "The commutator in a D.C motor is also called:", options: ["Slip rings", "Split rings", "Carbon brushes", "Iron core"], answer: 1, exp: "It consists of a ring split into two halves, each connected to one end of the coil." },
        { q: "The speed of a D.C motor can be increased by:", options: ["Increasing current", "Increasing turns", "Stronger magnetic field", "All of these"], answer: 3, exp: "Increasing these factors increases the torque, which accelerates the rotation speed." },
        { q: "Which of the following is NOT a part of a D.C motor?", options: ["Armature", "Commutator", "Slip rings", "Field magnet"], answer: 2, exp: "Slip rings are used in AC Generators; DC motors use split rings (commutators)." },
        { q: "The purpose of carbon brushes in a D.C motor is to:", options: ["Reverse current", "Pass current to the coil", "Hold the armature", "Produce magnetic field"], answer: 1, exp: "Brushes provide a sliding electrical contact between the stationary battery and rotating commutator." },
        { q: "The magnetic field in a motor is usually provided by:", options: ["Soft iron", "Permanent magnets or Electromagnets", "The armature", "The battery"], answer: 1, exp: "A radial magnetic field is required for the armature to experience force." },
        { q: "Torque on a current carrying coil is maximum when the coil is:", options: ["Parallel to field", "Perpendicular to field", "At 45 degrees", "Stationary"], answer: 0, exp: "Torque is max when the plane of the coil is parallel to the field because the side arms are perpendicular to the field lines." }
      ],
      "15.4 Electromagnetic Induction": [
        { q: "The process of inducing an EMF in a circuit by changing magnetic flux is:", options: ["Self induction", "Electromagnetic induction", "Mutual induction", "Conduction"], answer: 1, exp: "This phenomenon was discovered by Faraday and is the basis for generators and transformers." },
        { q: "Who discovered electromagnetic induction?", options: ["Michael Faraday", "Oersted", "Ampere", "Ohm"], answer: 0, exp: "Faraday showed that a changing magnetic field through a loop induces an electric current." },
        { q: "Induced EMF can be produced by:", options: ["Moving a magnet near a coil", "Moving a coil near a magnet", "Changing current in a nearby coil", "All of these"], answer: 3, exp: "Any action that changes the number of magnetic field lines (flux) through the circuit induces EMF." },
        { q: "The current produced by electromagnetic induction is called:", options: ["Direct current", "Induced current", "Static current", "Conventional current"], answer: 1, exp: "It is called 'induced' because it is caused by the change in the magnetic environment." },
        { q: "If the speed of the relative motion between magnet and coil increases, induced EMF:", options: ["Decreases", "Increases", "Stays same", "Disappears"], answer: 1, exp: "EMF is proportional to the *rate* of change of flux. Faster motion = faster change = higher EMF." },
        { q: "Induced EMF is directly proportional to the rate of change of:", options: ["Resistance", "Magnetic Flux", "Voltage", "Temperature"], answer: 1, exp: "This is Faraday's Law of Electromagnetic Induction: $\epsilon = -N (\Delta\Phi / \Delta t)$." },
        { q: "This law defines the magnitude of induced EMF:", options: ["Lenz's Law", "Faraday's Law", "Ohm's Law", "Coulomb's Law"], answer: 1, exp: "Faraday's law gives the quantity, while Lenz's law gives the direction." },
        { q: "The direction of induced current is found using:", options: ["Lenz's Law", "Faraday's Law", "Ampere's Law", "Joule's Law"], answer: 0, exp: "Lenz's Law states the current flows to oppose the change that created it." },
        { q: "Lenz's Law is based on the law of conservation of:", options: ["Charge", "Mass", "Energy", "Momentum"], answer: 2, exp: "Work must be done against the opposing magnetic force to produce electrical energy." },
        { q: "The induced current always ____ its cause:", options: ["Supports", "Opposes", "Doubles", "Triples"], answer: 1, exp: "If it supported its cause, we would create energy from nothing, violating physics laws." },
        { q: "If a North pole of a magnet is pushed into a coil, the near end of the coil becomes:", options: ["South Pole", "North Pole", "Neutral", "Negative"], answer: 1, exp: "The coil creates a North pole to repel the incoming North pole (opposing the motion)." },
        { q: "The direction of induced EMF is given by:", options: ["Faraday's Law", "Lenz's Law", "Ohm's Law", "Right hand rule"], answer: 1, exp: "Lenz's law provides the negative sign in Faraday's equation, indicating direction." },
        { q: "Electromagnetic induction produces:", options: ["Voltage", "Induced current", "Power", "Resistance"], answer: 1, exp: "While it generates an EMF (voltage), the resulting flow in a closed circuit is the induced current." }
      ],
      "15.5 A.C Generator": [
        { q: "A device that converts mechanical energy into electrical energy is:", options: ["Motor", "Transformer", "Generator", "Galvanometer"], answer: 2, exp: "Generators use mechanical rotation to move conductors through magnetic fields, inducing electricity." },
        { q: "The principle of an A.C Generator is:", options: ["Magnetic effect of current", "Electromagnetic induction", "Mutual induction", "Thermionic emission"], answer: 1, exp: "Generators operate by rotating a coil in a magnetic field to change flux." },
        { q: "In an A.C Generator, the output current is taken through:", options: ["Split rings", "Slip rings", "Brushes and Slip rings", "Commutator"], answer: 2, exp: "Slip rings allow the alternating current to pass to the external circuit without reversing polarity internally." },
        { q: "A.C stands for:", options: ["Ampere Current", "Alternating Current", "Automatic Current", "Average Current"], answer: 1, exp: "A.C is current that reverses its direction many times per second." },
        { q: "In one rotation of the coil in an A.C generator, the current changes direction:", options: ["Once", "Twice", "Three times", "Never"], answer: 1, exp: "The current goes through a positive peak and a negative peak per cycle (two direction changes)." },
        { q: "When the coil of a generator is parallel to the magnetic field, induced EMF is:", options: ["Zero", "Maximum", "Minimum", "Negative"], answer: 1, exp: "When parallel, the sides of the coil move perpendicularly to the field lines, cutting them at the maximum rate." },
        { q: "When the coil of a generator is perpendicular to magnetic field, induced EMF is:", options: ["Maximum", "Zero", "Constant", "High"], answer: 1, exp: "In this position, the sides of the coil move momentarily parallel to the field lines, so no lines are cut." },
        { q: "The frequency of A.C used in Pakistan is:", options: ["60 Hz", "50 Hz", "100 Hz", "220 Hz"], answer: 1, exp: "50 Hz means the current completes 50 full cycles of direction changes every second." },
        { q: "Which part of the A.C generator prevents the twisting of wires?", options: ["Armature", "Slip rings", "Magnets", "Iron core"], answer: 1, exp: "Slip rings provide a continuous sliding connection, allowing rotation without tangling wires." }
      ],
      "15.6 Mutual Induction & Transformers": [
        { q: "The production of induced EMF in one coil due to current change in another is:", options: ["Self Induction", "Mutual Induction", "Resonance", "Ionization"], answer: 1, exp: "Mutual induction occurs when the magnetic flux of one coil links with a secondary coil." },
        { q: "A transformer works on the principle of:", options: ["Self Induction", "Mutual Induction", "Magnetization", "Conduction"], answer: 1, exp: "A changing A.C in the primary induces a changing flux that generates EMF in the secondary." },
        { q: "The primary coil of a transformer is connected to:", options: ["Load", "A.C Source", "D.C Source", "Galvanometer"], answer: 1, exp: "The primary coil receives the input voltage that needs to be changed." },
        { q: "A transformer that increases voltage is called:", options: ["Step-down", "Step-up", "Iron core", "Secondary"], answer: 1, exp: "Step-up transformers have more turns on the secondary than the primary ($N_s > N_p$)." },
        { q: "A transformer that decreases voltage is called:", options: ["Step-up", "Step-down", "Primary", "Ideal"], answer: 1, exp: "Step-down transformers have fewer turns on the secondary than the primary ($N_s < N_p$)." },
        { q: "In a step-up transformer:", options: ["Ns > Np", "Ns < Np", "Ns = Np", "Vs < Vp"], answer: 0, exp: "Secondary turns ($N_s$) must be greater than primary turns ($N_p$) to increase voltage." },
        { q: "In a step-down transformer:", options: ["Ns > Np", "Ns < Np", "Vs > Vp", "Is < Ip"], answer: 1, exp: "Fewer secondary turns ($N_s < N_p$) result in a lower output voltage." },
        { q: "The core of a transformer is usually made of:", options: ["Steel", "Soft iron", "Copper", "Aluminum"], answer: 1, exp: "Soft iron is highly permeable, focusing the magnetic flux from primary to secondary efficiently." },
        { q: "For an ideal transformer, the power relation is:", options: ["Vp Ip = Vs Is", "Vp Is = Vs Ip", "Vp/Ip = Vs/Is", "Vp + Ip = Vs + Is"], answer: 0, exp: "In an ideal case, input power equals output power ($P_p = P_s$)." },
        { q: "Transformers cannot change the voltage of:", options: ["A.C", "D.C", "Sine wave", "Variable current"], answer: 1, exp: "D.C produces a constant magnetic field, which does not induce EMF in the secondary coil." },
        { q: "If Vs > Vp, the transformer is:", options: ["Step-down", "Step-up", "D.C transformer", "None"], answer: 1, exp: "Secondary voltage greater than primary voltage defines a step-up transformer." },
        { q: "In a step-up transformer, Ns/Np ratio is:", options: ["Less than 1", "Greater than 1", "Equal to 1", "Zero"], answer: 1, exp: "Transformation ratio $K = N_s/N_p$. For step-up, $K > 1$." },
        { q: "If Np = 100, Ns = 200 and Vp = 12V, then Vs is:", options: ["6V", "12V", "24V", "48V"], answer: 2, exp: "$V_s = (N_s/N_p) \times V_p = (200/100) \times 12 = 24V$." },
        { q: "Why is soft iron used for transformer cores?", options: ["It is a good conductor", "It is easily magnetized/demagnetized", "It is cheap", "It is very hard"], answer: 1, exp: "This reduces 'hysteresis loss' because the iron quickly aligns with the alternating magnetic field." },
        { q: "Large transformers produce heat and are cooled by:", options: ["Fans", "Water", "Oil", "Liquid Nitrogen"], answer: 2, exp: "Transformer oil acts as both an electrical insulator and a cooling medium." },
        { q: "A transformer is used to change:", options: ["Power", "A.C Voltage", "D.C Voltage", "Energy"], answer: 1, exp: "Transformers change voltage levels; they cannot create more power or energy." },
        { q: "Step-up transformer increases secondary ____:", options: ["Current", "Voltage", "Power", "Frequency"], answer: 1, exp: "It increases voltage, but conservation of energy means secondary current actually decreases." },
        { q: "If the transformer is 100% efficient, then:", options: ["Ps > Pp", "Ps < Pp", "Ps = Pp", "Vs = Vp"], answer: 2, exp: "100% efficiency means output power ($P_s$) equals input power ($P_p$)." },
        { q: "What happens to a transformer if it is connected to a D.C source?", options: ["It works better", "The core melts", "No EMF is induced in secondary", "Secondary voltage doubles"], answer: 2, exp: "EMF induction requires *changing* magnetic flux; D.C flux is static." }
      ],
      "15.7 Applications & Devices": [
        { q: "A relay is an electrical switch that works on the principle of:", options: ["Electrostatics", "Electromagnetism", "Heating effect", "Mutual Induction"], answer: 1, exp: "An electromagnet in the relay pulls a switch contact closed or open." },
        { q: "The main components of a relay are:", options: ["Armature and Spring", "Electromagnet", "Contacts", "All of these"], answer: 3, exp: "A relay needs a coil (electromagnet), a moving part (armature), and electrical connection points (contacts)." },
        { q: "A small current through the relay coil can control a ____ current in another circuit:", options: ["Small", "Large", "Zero", "Alternating"], answer: 1, exp: "This is the primary function of a relay—using low power to safely control high power devices." },
        { q: "MRI uses ____ to create images of internal body organs:", options: ["X-rays", "Strong magnetic fields", "Heat", "Sound waves"], answer: 1, exp: "MRI aligns protons in the body using powerful magnets and radio waves." },
        { q: "Magnetic tapes in cassettes use ____ to store information:", options: ["Heat", "Electromagnetism", "Light", "Static"], answer: 1, exp: "Small magnetic particles on the tape are oriented by an electromagnet 'head' during recording." },
        { q: "MRI stands for:", options: ["Magnetic Resonance Imaging", "Metal Ray Interference", "Motion Range Index", "Mutual Radio Imaging"], answer: 0, exp: "It is a medical imaging technique based on Nuclear Magnetic Resonance." },
        { q: "Relays are used to control ____ circuits with ____ currents:", options: ["High power, small", "Low power, high", "D.C, A.C", "Parallel, series"], answer: 0, exp: "Small control currents activate the electromagnet to switch on high-power machinery." }
      ],
      "15.8 Additional Concepts & SI Units": [
        { q: "The SI unit of magnetic flux is:", options: ["Tesla", "Weber", "Ohm", "Henry"], answer: 1, exp: "One Weber (Wb) is the flux that, linking a circuit of one turn, produces in it an EMF of one volt if reduced to zero at a uniform rate in one second." },
        { q: "The SI unit of magnetic induction (B) is:", options: ["Weber", "Tesla", "Volt", "Ampere"], answer: 1, exp: "Tesla (T) measures the density of the magnetic field lines." },
        { q: "The number of lines of force passing through a unit area is called:", options: ["Flux", "Magnetic Induction", "Permeability", "Resistance"], answer: 1, exp: "Also known as Magnetic Flux Density (B)." },
        { q: "Magnetic field lines never ____ each other:", options: ["Touch", "Cross (Intersect)", "Parallel", "Follow"], answer: 1, exp: "If they crossed, the magnetic field would have two different directions at the same point, which is impossible." },
        { q: "Right Hand Grip Rule for a straight wire: Thumb points to ____ and curled fingers to ____:", options: ["Field, Current", "Current, Field", "Force, Field", "Current, Force"], answer: 1, exp: "This is the fundamental mnemonic for visualizing the circular field around a wire." },
        { q: "If the number of turns in a primary coil is 10 and secondary is 100, the voltage will be:", options: ["10 times less", "10 times more", "Same", "Zero"], answer: 1, exp: "Voltage ratio follows turns ratio: $100/10 = 10$. Output is 10x higher." },
        { q: "In a transformer, the energy is transferred from primary to secondary through:", options: ["Wires", "Magnetic Field", "Battery", "Carbon brushes"], answer: 1, exp: "There is no direct electrical connection between the two coils; they are 'magnetically coupled'." },
        { q: "A transformer with Np=50 and Ns=10 is a:", options: ["Step-up", "Step-down", "Ideal", "D.C transformer"], answer: 1, exp: "Since $N_s < N_p$, the output voltage will be lower than the input." },
        { q: "When magnetic flux through a coil is constant, the induced EMF is:", options: ["Maximum", "Zero", "Increasing", "Negative"], answer: 1, exp: "EMF only exists when there is a *change* ($\Delta\Phi$) in flux." },
        { q: "The power station uses ____ transformers to transmit electricity over long distances:", options: ["Step-down", "Step-up", "No", "Small"], answer: 1, exp: "Stepping up voltage reduces the current, which minimizes energy lost as heat in the transmission lines." },
        { q: "High voltage transmission reduces ____ during transport:", options: ["Voltage", "Current and Energy loss", "Frequency", "Power"], answer: 1, exp: "Since $P = I^2R$, reducing current ($I$) by raising voltage dramatically lowers energy loss." },
        { q: "Magnetism is a ____ property:", options: ["Scalar", "Vector", "Chemical", "Biological"], answer: 1, exp: "Magnetic fields have both magnitude and direction, making them vector fields." },
        { q: "The force on a moving charge in a magnetic field is called:", options: ["Coulomb Force", "Lorentz Force", "Gravitational Force", "Nuclear Force"], answer: 1, exp: "Lorentz Force is the combination of electric and magnetic force on a point charge." },
        { q: "An electromagnet is a ____ magnet:", options: ["Permanent", "Temporary", "Natural", "Weak"], answer: 1, exp: "It only exhibits magnetism as long as electric current is flowing through its coils." },
        { q: "A piece of soft iron becomes a magnet when placed inside a:", options: ["Beaker", "Solenoid", "Refrigerator", "Glass tube"], answer: 1, exp: "The solenoid's internal magnetic field aligns the domains within the soft iron." }
      ]
    }
  },
            "16": {
        title: "Introductory Electronics",
        topics: {
            "16.1 Thermionic Emission": [
                { q: "The process of emitting electrons from a hot metal surface is called:", options: ["Ionization", "Thermionic Emission", "Conduction", "Radiation"], answer: 1, exp: "The prefix 'therm-' refers to heat, and 'ionic' refers to the emission of charged particles (electrons)." },
                { q: "Thermionic emission was first observed by:", options: ["Newton", "Faraday", "Thomas Edison", "Oersted"], answer: 2, exp: "Edison noticed current flowing from a heated filament to a plate in a vacuum, known as the Edison Effect." },
                { q: "To produce thermionic emission, a metal filament is heated by:", options: ["Magnetic field", "Electric current", "Sound waves", "Light"], answer: 1, exp: "Electric current passing through a filament generates heat due to resistance, providing energy to electrons." },
                { q: "The charge on an electron is:", options: ["Positive", "Negative", "Neutral", "Variable"], answer: 1, exp: "Electrons are fundamental subatomic particles with a standard negative charge of approximately -1.6 x 10^-19 C." },
                { q: "Electrons are also known as:", options: ["Anode rays", "Cathode rays", "Alpha rays", "Gamma rays"], answer: 1, exp: "They were named cathode rays because they were observed being emitted from the negative electrode (cathode) in vacuum tubes." },
                { q: "In a vacuum tube, the electrode that emits electrons is the:", options: ["Anode", "Cathode", "Grid", "Plate"], answer: 1, exp: "The cathode is heated to release electrons via thermionic emission; the anode then attracts them." },
                { q: "Why is a vacuum necessary in the electron gun?", options: ["To speed up electrons", "To prevent electrons colliding with air molecules", "To cool the filament", "To save electricity"], answer: 1, exp: "In the presence of air, electrons would collide with gas molecules, losing energy and scattering before reaching the target." },
                { q: "The kinetic energy of emitted electrons depends on:", options: ["Air pressure", "Temperature of the surface", "Color of the metal", "Shape of the metal"], answer: 1, exp: "Higher temperatures provide more thermal energy, allowing electrons to escape the metal surface with higher velocity." },
                { q: "The device used to investigate the properties of electron beams is:", options: ["Ammeter", "Cathode-Ray Oscilloscope", "Voltmeter", "Transformer"], answer: 1, exp: "A C.R.O. uses an electron gun and deflecting plates to visualize and analyze electron beam behavior." },
                { q: "When an electron beam passes through an electric field, it bends towards:", options: ["Positive plate", "Negative plate", "North pole", "South pole"], answer: 0, exp: "Since electrons are negatively charged, they are electrostatically attracted to the positive terminal/plate." }
            ],
            "16.2 Investigating Properties of Electrons": [
                { q: "Electron beams are deflected by:", options: ["Electric fields only", "Magnetic fields only", "Both Electric and Magnetic fields", "Neither field"], answer: 2, exp: "Moving charges interact with both electric fields (via Coulomb force) and magnetic fields (via Lorentz force)." },
                { q: "The deflection of electrons in a magnetic field is determined by:", options: ["Fleming's Left Hand Rule", "Right Hand Grip Rule", "Lenz's Law", "Ohm's Law"], answer: 0, exp: "Fleming's Left Hand Rule relates the force, magnetic field, and current direction (opposite to electron flow)." },
                { q: "If an electron beam moves horizontally, a vertical magnetic field will deflect it:", options: ["Forward", "Backward", "Sideways (perpendicular)", "Not at all"], answer: 2, exp: "The magnetic force is always perpendicular to both the velocity of the charge and the magnetic field direction." },
                { q: "Cathode rays are actually a stream of high-speed:", options: ["Protons", "Neutrons", "Electrons", "Photons"], answer: 2, exp: "Scientific experiments by J.J. Thomson proved cathode rays consist of particles with negative charge and very small mass." },
                { q: "The screen of a CRT is coated with ____ to make the beam visible:", options: ["Gold", "Fluorescent material (Phosphor)", "Copper", "Aluminum"], answer: 1, exp: "Phosphor molecules glow (fluoresce) when struck by high-energy electrons, converting kinetic energy into light." }
            ],
            "16.3 Cathode-Ray Oscilloscope (C.R.O)": [
                { q: "C.R.O stands for:", options: ["Current Ray Oscillator", "Cathode-Ray Oscilloscope", "Carbon Rod Operator", "Central Radio Output"], answer: 1, exp: "It is an instrument used to observe 'oscillations' (waves) produced by 'cathode rays' (electrons)." },
                { q: "Which part of C.R.O accelerates and focuses the beam?", options: ["Deflecting plates", "Fluorescent screen", "Electron gun", "Vacuum pump"], answer: 2, exp: "The electron gun contains the filament, cathode, grid, and anodes designed to produce a sharp, fast beam." },
                { q: "The X-plates in a C.R.O provide deflection in the ____ direction:", options: ["Vertical", "Horizontal", "Diagonal", "Circular"], answer: 1, exp: "X-plates are arranged vertically but create a horizontal field to sweep the beam across the screen (X-axis)." },
                { q: "The Y-plates in a C.R.O provide deflection in the ____ direction:", options: ["Horizontal", "Vertical", "Circular", "None"], answer: 1, exp: "Y-plates are arranged horizontally to create a vertical field, moving the beam up and down (Y-axis)." },
                { q: "The 'Time Base' in C.R.O is connected to:", options: ["Y-plates", "X-plates", "Filament", "Anode"], answer: 1, exp: "The time base generates a sawtooth voltage that moves the beam horizontally at a constant speed to show time-varying signals." },
                { q: "The brightness of the spot on the C.R.O screen is controlled by:", options: ["Anode", "Grid", "Cathode", "X-plates"], answer: 1, exp: "The control grid is kept at a negative potential; varying this potential changes the number of electrons reaching the screen." },
                { q: "The voltage that changes with time is called:", options: ["D.C Voltage", "Sawtooth Voltage", "Static Voltage", "Fixed Voltage"], answer: 1, exp: "Sawtooth voltage rises linearly and drops sharply, moving the beam steadily across and then quickly 'resetting' it." },
                { q: "C.R.O can be used to measure:", options: ["Voltage", "Frequency", "Time period", "All of these"], answer: 3, exp: "By analyzing the height (amplitude) and width (cycles) of the waveform, we can calculate voltage, period, and frequency." },
                { q: "A vertical line is seen on the screen if ____ is turned off:", options: ["Y-gain", "Time Base", "Brightness", "Focus"], answer: 1, exp: "Without the horizontal sweep (Time Base), the beam only moves up and down in one spot, forming a line." },
                { q: "If both X and Y deflections are zero, what appears on the screen?", options: ["A wave", "A line", "A bright spot at center", "Nothing"], answer: 2, exp: "If no voltage is applied to any plates, the beam travels straight through to the middle of the screen." }
            ],
            "16.4 Analog and Digital Electronics": [
                { q: "Quantities that vary continuously are called:", options: ["Digital", "Analog", "Static", "Random"], answer: 1, exp: "Analog signals can take any value within a range, like temperature or sound waves." },
                { q: "Quantities that vary in discrete steps are called:", options: ["Analog", "Digital", "Infinite", "Continuous"], answer: 1, exp: "Digital signals jump between specific levels (usually 0 and 1) without passing through intermediate values." },
                { q: "Which of the following is an analog quantity?", options: ["Temperature of air", "Pages in a book", "Number of students", "Bank account digits"], answer: 0, exp: "Air temperature changes smoothly (e.g., 25.1° to 25.2°) rather than jumping in fixed integer steps." },
                { q: "Digital electronics works with only ____ digits:", options: ["1 and 2", "0 and 1", "0 to 9", "1 to 10"], answer: 1, exp: "Digital logic is binary, using '0' for Low/Off and '1' for High/On." },
                { q: "ADC stands for:", options: ["Analog to Digital Converter", "All Digital Circuit", "Alpha Data Center", "Automatic Data Controller"], answer: 0, exp: "An ADC takes real-world continuous signals (like voice) and converts them into binary numbers for computers." },
                { q: "DAC stands for:", options: ["Data Analog Computer", "Digital to Analog Converter", "Direct Access Circuit", "Double Analog Current"], answer: 1, exp: "A DAC converts binary data back into continuous signals, like playing digital music through an analog speaker." },
                { q: "Computer, Calculator, and Digital Watches use ____ electronics:", options: ["Analog", "Digital", "Mechanical", "Thermal"], answer: 1, exp: "These devices process information as discrete binary bits for precision and speed." },
                { q: "Binary system consists of how many digits?", options: ["Ten", "Two", "Eight", "Sixteen"], answer: 1, exp: "Bi- means two; the binary system uses base-2 notation (0 and 1)." },
                { q: "A high voltage level (5V) is usually represented by:", options: ["0", "1", "2", "Off"], answer: 1, exp: "In positive logic, the presence of voltage (high) corresponds to logic state 1." },
                { q: "A low voltage level (0V) is usually represented by:", options: ["1", "0", "On", "5"], answer: 1, exp: "In positive logic, the absence of voltage (low) corresponds to logic state 0." }
            ],
            "16.5 Logic Gates (AND, OR, NOT)": [
                { q: "The circuits which implement various logic operations are:", options: ["Resistors", "Logic Gates", "Capacitors", "Inductors"], answer: 1, exp: "Logic gates are the basic building blocks that process binary inputs to produce a logical output." },
                { q: "The logic gate that performs multiplication is:", options: ["OR gate", "NOT gate", "AND gate", "NAND gate"], answer: 2, exp: "AND gate logic is equivalent to binary multiplication (1x1=1, 1x0=0)." },
                { q: "The output of an AND gate is 1 only when:", options: ["One input is 1", "Both inputs are 1", "Both inputs are 0", "Any input is 1"], answer: 1, exp: "Like a series circuit, current only flows if both switches (inputs) are closed." },
                { q: "The Boolean expression for AND gate is:", options: ["X = A + B", "X = A . B", "X = A'", "X = A - B"], answer: 1, exp: "The dot (.) symbol represents the logical AND operation (multiplication)." },
                { q: "The logic gate that performs addition is:", options: ["AND gate", "NOT gate", "OR gate", "NOR gate"], answer: 2, exp: "OR gate logic is similar to binary addition (though 1+1 = 1 in logic terms)." },
                { q: "The output of an OR gate is 0 only when:", options: ["One input is 1", "Both inputs are 1", "Both inputs are 0", "Any input is 0"], answer: 2, exp: "Like a parallel circuit, if any switch is closed, current flows. It only stops if both are open (0)." },
                { q: "The Boolean expression for OR gate is:", options: ["X = A . B", "X = A + B", "X = A'", "X = A/B"], answer: 1, exp: "The plus (+) symbol represents the logical OR operation (addition)." },
                { q: "The gate that inverts the input is:", options: ["AND gate", "OR gate", "NOT gate", "NAND gate"], answer: 2, exp: "A NOT gate flips the signal: 0 becomes 1, and 1 becomes 0." },
                { q: "A NOT gate has how many inputs?", options: ["One", "Two", "Three", "Four"], answer: 0, exp: "By definition, an inverter only takes a single input signal to reverse its state." },
                { q: "The Boolean expression for NOT gate is:", options: ["X = A + B", "X = A . B", "X = A'", "X = A + 1"], answer: 2, exp: "The prime (') or bar over the letter signifies the 'NOT' or complement of that variable." },
                { q: "A NOT gate is also known as:", options: ["Adder", "Multiplier", "Inverter", "Subtractor"], answer: 2, exp: "It 'inverts' the logic level from high to low or vice versa." },
                { q: "Truth table is a table showing all possible combinations of:", options: ["Resistors", "Inputs and Outputs", "Voltages", "Currents"], answer: 1, exp: "It maps out every possible input state and the resulting output state for a logic circuit." }
            ],
            "16.6 Universal Gates (NAND, NOR)": [
                { q: "NAND gate is a combination of:", options: ["AND and OR", "AND and NOT", "OR and NOT", "NOT and NOT"], answer: 1, exp: "NAND stands for 'NOT-AND', meaning an AND gate followed by an inverter." },
                { q: "The output of a NAND gate is 0 only when:", options: ["Both inputs are 0", "Both inputs are 1", "One input is 1", "One input is 0"], answer: 1, exp: "An AND gate gives 1 only when both are 1. The NOT part flips that 1 to a 0." },
                { q: "The Boolean expression for NAND gate is:", options: ["X = A + B", "X = (A.B)'", "X = A.B", "X = A'+B'"], answer: 1, exp: "The expression (A.B)' means perform the AND operation first, then apply the NOT." },
                { q: "NOR gate is a combination of:", options: ["OR and NOT", "AND and NOT", "OR and AND", "NOT and NOT"], answer: 0, exp: "NOR stands for 'NOT-OR', meaning an OR gate followed by an inverter." },
                { q: "The output of a NOR gate is 1 only when:", options: ["Both inputs are 1", "Both inputs are 0", "One input is 1", "Any input is 1"], answer: 1, exp: "An OR gate gives 0 only when both are 0. The NOT part flips that 0 to a 1." },
                { q: "The Boolean expression for NOR gate is:", options: ["X = A + B", "X = A . B", "X = (A + B)'", "X = A' . B"], answer: 2, exp: "The expression (A+B)' means perform the OR operation first, then apply the NOT." },
                { q: "Which gate can be used to make all other gates?", options: ["OR", "AND", "NOT", "NAND or NOR"], answer: 3, exp: "NAND and NOR are 'Universal Gates' because any logical function can be built using only them." },
                { q: "If the input of a NOT gate is 0, the output is:", options: ["0", "1", "High", "Both 1 and High"], answer: 3, exp: "The output is 1, which in digital logic represents the 'High' voltage state." },
                { q: "If A=1 and B=1 for a NOR gate, the output is:", options: ["1", "0", "High", "Unknown"], answer: 1, exp: "1 OR 1 is 1. Applying NOT to 1 results in 0." },
                { q: "If A=0 and B=1 for a NAND gate, the output is:", options: ["0", "1", "Low", "Unknown"], answer: 1, exp: "0 AND 1 is 0. Applying NOT to 0 results in 1." }
            ],
            "16.7 Uses of Logic Gates": [
                { q: "Which gate is used in a fire alarm system to activate it when smoke OR heat is detected?", options: ["AND", "OR", "NOT", "NAND"], answer: 1, exp: "The OR gate allows the alarm to sound if either condition (smoke OR heat) is met." },
                { q: "A burglar alarm often uses a ____ gate to trigger an alarm when a sensor is tripped:", options: ["NAND", "OR", "NOT", "AND"], answer: 0, exp: "NAND gates are versatile for setting conditions where an alarm triggers when a steady input loop is broken." },
                { q: "In a house security system, logic gates are used as:", options: ["Power sources", "Control units", "Resistors", "Cables"], answer: 1, exp: "They act as the 'brain' or decision-making part of the circuit based on sensor inputs." },
                { q: "A NOT gate can be used as a simple ____ indicator:", options: ["Safety", "Logic inverter", "Power supply", "Speed"], answer: 1, exp: "It is primarily used to change the status of a logic line, like turning a light OFF when a sensor is ON." },
                { q: "The LDR (Light Dependent Resistor) is used in circuits to sense:", options: ["Sound", "Heat", "Light", "Pressure"], answer: 2, exp: "LDRs are made of semiconductor material whose conductivity changes with photon (light) exposure." },
                { q: "As light intensity increases, the resistance of LDR:", options: ["Increases", "Decreases", "Stays same", "Becomes zero"], answer: 1, exp: "More light provides more energy to free electrons in the semiconductor, lowering the resistance." },
                { q: "A thermistor is used to sense:", options: ["Light", "Temperature", "Moisture", "Gas"], answer: 1, exp: "Thermistors are thermal resistors whose resistance changes significantly with temperature." },
                { q: "Electronic systems used to monitor and control industrial processes are called:", options: ["Manual", "Automatic Control Systems", "Analog", "Simple"], answer: 1, exp: "These systems use sensors and logic gates to operate machinery without human intervention." },
                { q: "Which gate output is 1 if either or both inputs are 1?", options: ["AND", "OR", "NOT", "NAND"], answer: 1, exp: "This is the definition of the OR logic function." },
                { q: "The combination of NAND and NOT gates (in series) behaves as an:", options: ["OR gate", "AND gate", "NOR gate", "XOR gate"], answer: 1, exp: "NAND is (AND + NOT). Adding another NOT cancels the first NOT, leaving just the AND function." }
            ],
            "16.8 Comprehensive Reinforcement": [
                { q: "Which electrode is maintained at a high positive potential in a CRT?", options: ["Cathode", "Anode", "Grid", "Filament"], answer: 1, exp: "The anode attracts the negatively charged electrons and accelerates them towards the screen." },
                { q: "The grid in a CRT is usually at a ____ potential relative to the cathode:", options: ["Positive", "Negative", "Zero", "Very High"], answer: 1, exp: "A negative grid repels some electrons, allowing us to control the intensity (brightness) of the beam." },
                { q: "The spot on the screen moves from left to right due to voltage on:", options: ["Y-plates", "X-plates", "Anode", "Cathode"], answer: 1, exp: "The horizontal deflection plates (X-plates) control the side-to-side motion." },
                { q: "If the Time Base is switched off, the spot on the screen becomes a:", options: ["Horizontal line", "Vertical line", "Circle", "Wave"], answer: 1, exp: "Without horizontal movement, only the vertical input (Y-axis) is displayed, forming a vertical line." },
                { q: "Analog signal is usually in the form of a ____ wave:", options: ["Square", "Continuous Sine", "Pulse", "Step"], answer: 1, exp: "Sine waves represent smooth, continuous fluctuations typical of natural phenomena." },
                { q: "Digital signal is usually in the form of a ____ wave:", options: ["Sine", "Square/Pulse", "Triangle", "Random"], answer: 1, exp: "Square waves represent sharp transitions between high and low binary states." },
                { q: "The process of converting analog information into digital form is:", options: ["Modulation", "Digitization", "Amplification", "Rectification"], answer: 1, exp: "Digitization involves sampling the analog signal and assigning numerical (binary) values." },
                { q: "A single binary digit (0 or 1) is called a:", options: ["Byte", "Bit", "Nibble", "Word"], answer: 1, exp: "'Bit' is a contraction of 'Binary Digit'." },
                { q: "8 bits make up one:", options: ["Kilobit", "Megabit", "Byte", "Word"], answer: 2, exp: "A byte is the standard unit of data measurement in computing." },
                { q: "Which gate is like two switches in parallel?", options: ["AND", "OR", "NOT", "NOR"], answer: 1, exp: "In parallel, if Switch A OR Switch B is closed, the circuit is complete." },
                { q: "Which gate is like two switches in series?", options: ["OR", "AND", "NAND", "NOT"], answer: 1, exp: "In series, both Switch A AND Switch B must be closed for current to flow." },
                { q: "If you connect the two inputs of a NAND gate together, it acts as a:", options: ["OR gate", "NOT gate", "AND gate", "NOR gate"], answer: 1, exp: "If inputs are tied, they are always the same. 0-0 gives 1, and 1-1 gives 0, which is NOT logic." },
                { q: "If you connect the two inputs of a NOR gate together, it acts as a:", options: ["OR gate", "AND gate", "NOT gate", "NAND gate"], answer: 2, exp: "Tying inputs means 0-0 results in 1, and 1-1 results in 0, creating an inverter (NOT)." },
                { q: "In binary logic, '0' represents:", options: ["False/Off", "True/On", "Maybe", "High"], answer: 0, exp: "Zero generally signifies the absence of a condition or 'Low' voltage." },
                { q: "In binary logic, '1' represents:", options: ["False", "Low", "True/On", "Empty"], answer: 2, exp: "One generally signifies the presence of a condition or 'High' voltage." },
                { q: "Modern communication systems rely heavily on ____ electronics:", options: ["Analog", "Digital", "Old", "Valve"], answer: 1, exp: "Digital systems are faster, more reliable, and can handle more data without noise interference." },
                { q: "The heart of a computer is the ____ which contains millions of logic gates:", options: ["Hard drive", "Monitor", "Microprocessor", "Keyboard"], answer: 2, exp: "The microprocessor (CPU) performs all logic and arithmetic using billions of microscopic transistors." },
                { q: "Electronics is the branch of applied physics which deals with the control of ____ using different devices:", options: ["Protons", "Neutrons", "Electrons", "Atoms"], answer: 2, exp: "Electronic devices work by manipulating the flow and energy of electrons." },
                { q: "Logic gates are the basic building blocks of ____ circuits:", options: ["Analog", "Digital", "Power", "Heating"], answer: 1, exp: "Since they handle 0s and 1s, they are the foundation of all digital technology." },
                { q: "Which property of the electron beam is used in TV tubes?", options: ["Weight", "Deflection by fields", "Color", "Transparency"], answer: 1, exp: "Older TVs (CRT) used magnetic coils to deflect an electron beam across the screen to draw pictures." }
            ]
        }
    },

            "18": {
    title: "Atomic and Nuclear Physics",
    topics: {
      "18.1 The Atom and Atomic Nucleus": [
        { q: "The central part of an atom is called:", options: ["Proton", "Neutron", "Nucleus", "Electron"], answer: 2, exp: "The nucleus is the small, dense, positively charged center of an atom." },
        { q: "The size of a nucleus is roughly how many times smaller than the atom?", options: ["10 times", "100 times", "1,000 times", "100,000 times"], answer: 3, exp: "The nucleus is extremely tiny compared to the overall volume of the atom occupied by electrons." },
        { q: "The charge on a neutron is:", options: ["Positive", "Negative", "Neutral", "Double positive"], answer: 2, exp: "Neutrons carry no net electrical charge." },
        { q: "Atomic number is represented by the symbol:", options: ["A", "N", "Z", "M"], answer: 2, exp: "'Z' represents the number of protons in the nucleus." },
        { q: "Nucleon number is represented by the symbol:", options: ["A", "N", "Z", "X"], answer: 0, exp: "'A' represents the total number of protons and neutrons (nucleons)." },
        { q: "The formula to find the number of neutrons (N) is:", options: ["N = A + Z", "N = A - Z", "N = Z - A", "N = A / Z"], answer: 1, exp: "Neutrons = Mass Number (A) - Atomic Number (Z)." },
        { q: "Which particle is the lightest in an atom?", options: ["Proton", "Neutron", "Electron", "Alpha particle"], answer: 2, exp: "The mass of an electron is about 1/1836th the mass of a proton." },
        { q: "The mass of a neutron is approximately equal to the mass of:", options: ["An electron", "A proton", "A positron", "An alpha particle"], answer: 1, exp: "Protons and neutrons have nearly identical masses, around 1 amu." },
        { q: "Isotopes are atoms of the same element with different number of:", options: ["Protons", "Electrons", "Neutrons", "Positrons"], answer: 2, exp: "Isotopes have the same Z (protons) but different A (nucleons) due to neutrons." },
        { q: "How many isotopes does Hydrogen have?", options: ["One", "Two", "Three", "Four"], answer: 2, exp: "The three isotopes are Protium, Deuterium, and Tritium." },
        { q: "The isotope of Hydrogen with one proton and one neutron is:", options: ["Protium", "Deuterium", "Tritium", "Heavy water"], answer: 1, exp: "Deuterium ($^2H$) has one proton and one neutron." },
        { q: "The isotope of Hydrogen with one proton and two neutrons is:", options: ["Protium", "Deuterium", "Tritium", "Helium"], answer: 2, exp: "Tritium ($^3H$) is the radioactive isotope of hydrogen." },
        { q: "Atomic mass is measured in units called:", options: ["kg", "g", "amu", "mol"], answer: 2, exp: "The 'amu' (atomic mass unit) is defined as 1/12th the mass of a Carbon-12 atom." }
      ],
      "18.2 Natural Radioactivity": [
        { q: "Spontaneous emission of radiation by unstable nuclei is called:", options: ["Ionization", "Radioactivity", "Fission", "Fusion"], answer: 1, exp: "Radioactivity is the process where unstable atoms release energy to reach stability." },
        { q: "Natural radioactivity was discovered in which year?", options: ["1890", "1896", "1905", "1911"], answer: 1, exp: "Henri Becquerel discovered radioactivity in 1896 while working with uranium salts." },
        { q: "Radioactivity is a process that is:", options: ["Chemical", "Spontaneous", "Physical", "Temperature dependent"], answer: 1, exp: "Nuclear decay happens randomly and naturally without external influence." },
        { q: "Which of the following is NOT a type of nuclear radiation?", options: ["Alpha", "Beta", "Gamma", "X-ray"], answer: 3, exp: "X-rays are electromagnetic waves originating from electron transitions, not the nucleus." },
        { q: "The charge on an alpha particle is:", options: ["-1", "0", "+1", "+2"], answer: 3, exp: "Alpha particles consist of 2 protons and 2 neutrons ($He^{2+}$)." },
        { q: "The charge on a beta particle is:", options: ["-1", "0", "+1", "+2"], answer: 0, exp: "A beta particle is a high-speed electron with a charge of -1." },
        { q: "The mass of an alpha particle is how many times the mass of a proton?", options: ["2", "4", "8", "1"], answer: 1, exp: "Containing 4 nucleons, it is roughly 4 times heavier than a single proton." },
        { q: "Alpha particles are essentially nuclei of:", options: ["Hydrogen", "Lithium", "Helium", "Beryllium"], answer: 2, exp: "An alpha particle is a Helium-4 nucleus." },
        { q: "Beta particles are high speed:", options: ["Protons", "Neutrons", "Electrons", "Photons"], answer: 2, exp: "Beta radiation consists of electrons emitted from the nucleus during neutron decay." },
        { q: "Gamma rays are high energy:", options: ["Particles", "Electrons", "Photons", "Protons"], answer: 2, exp: "Gamma radiation is high-frequency electromagnetic radiation (photons)." },
        { q: "Which radiation has the greatest penetrating power?", options: ["Alpha", "Beta", "Gamma", "Neutron"], answer: 2, exp: "Gamma rays can pass through several centimeters of lead due to being chargeless photons." },
        { q: "Which radiation has the least penetrating power?", options: ["Alpha", "Beta", "Gamma", "X-ray"], answer: 0, exp: "Alpha particles are heavy and highly charged, so they are stopped by a sheet of paper." },
        { q: "Penetrating power of Beta radiation is how many times that of Alpha?", options: ["10", "100", "1000", "50"], answer: 1, exp: "Beta particles are much smaller and faster than alpha particles." },
        { q: "Which radiation is most easily deflected by a magnetic field?", options: ["Alpha", "Beta", "Gamma", "Neutrons"], answer: 1, exp: "Beta particles are much lighter than Alpha particles, making them more sensitive to magnetic forces." },
        { q: "Gamma rays can be stopped by a thick layer of:", options: ["Paper", "Aluminum", "Lead", "Skin"], answer: 2, exp: "Dense materials like lead or thick concrete are required to attenuate gamma rays." },
        { q: "Alpha particles can be stopped by:", options: ["Lead", "Aluminum", "A sheet of paper", "Concrete"], answer: 2, exp: "Their large size and +2 charge make them collide easily with atoms in paper." },
        { q: "Which radiation is neutral?", options: ["Alpha", "Beta", "Gamma", "Cathode rays"], answer: 2, exp: "Gamma radiation is electromagnetic and carries no charge." },
        { q: "The ability of radiation to knock electrons out of atoms is called:", options: ["Fluorescence", "Ionization", "Transmutation", "Decay"], answer: 1, exp: "Ionizing radiation has enough energy to create ion pairs in matter." },
        { q: "Which has the highest ionizing power?", options: ["Alpha", "Beta", "Gamma", "X-rays"], answer: 0, exp: "Alpha particles have the highest charge (+2) and slow speed, making them highly ionizing." }

      "18.3 Nuclear Transmutations": [
        { q: "The process of changing one element into another is called:", options: ["Fission", "Fusion", "Nuclear Transmutation", "Ionization"], answer: 2, exp: "This occurs when the number of protons in a nucleus changes during decay." },
        { q: "In Alpha decay, the Mass Number (A) decreases by:", options: ["1", "2", "3", "4"], answer: 3, exp: "The nucleus loses 2 protons and 2 neutrons (total 4 nucleons)." },
        { q: "In Alpha decay, the Atomic Number (Z) decreases by:", options: ["1", "2", "3", "4"], answer: 1, exp: "Two protons are lost, so Z decreases by 2." },
        { q: "In Beta decay, the Mass Number (A) of the daughter nucleus:", options: ["Decreases by 1", "Increases by 1", "Stays the same", "Decreases by 4"], answer: 2, exp: "A neutron turns into a proton; the total number of nucleons remains constant." },
        { q: "In Beta decay, the Atomic Number (Z) of the daughter nucleus:", options: ["Decreases by 1", "Increases by 1", "Stays the same", "Decreases by 2"], answer: 1, exp: "Since a neutron becomes a proton, Z increases by 1." },
        { q: "Gamma emission usually occurs along with:", options: ["Alpha decay", "Beta decay", "Both A and B", "Fission only"], answer: 2, exp: "Gamma rays are emitted when a daughter nucleus is in an excited state after $\alpha$ or $\beta$ decay." },

        { q: "A beta particle is emitted when a ____ inside the nucleus decays:", options: ["Proton", "Neutron", "Electron", "Meson"], answer: 1, exp: "A neutron decays into a proton, an electron (beta), and an antineutrino." }
      ],
      "18.4 Half-Life and Its Measurement": [

        { q: "The activity of a sample is measured in:", options: ["Watts", "Becquerels", "Joules", "Newtons"], answer: 1, exp: "Named after Henri Becquerel, 1 Bq = 1 decay per second." },

        { q: "If the initial amount is N0, the amount left after 'n' half-lives is:", options: ["N0 / n", "N0 / 2n", "N0 / 2^n", "N0 * 2^n"], answer: 2, exp: "The general decay equation is $N = N_0(1/2)^n$." },

        { q: "One atomic mass unit (1 amu) is equal to:", options: ["1.66 x 10^-27 kg", "9.1 x 10^-31 kg", "1.6 x 10^-19 kg", "1 kg"], answer: 0, exp: "Calculated based on 1/12th the mass of Carbon-12." },
        { q: "The isotope used in smoke detectors is:", options: ["Carbon-14", "Americium-241", "Cobalt-60", "Uranium-238"], answer: 1, exp: "Am-241 emits alpha particles that ionize air inside the detector." },
        { q: "Which radiation is used for thickness control in paper mills?", options: ["Alpha", "Beta", "Gamma", "X-ray"], answer: 1, exp: "Beta particles are sensitive enough to changes in thin materials like paper." },
        { q: "A 'cloud chamber' is used to:", options: ["Measure half-life", "Detect radiations", "Produce isotopes", "Control fission"], answer: 1, exp: "It makes the tracks of ionizing particles visible as vapor trails." },
        { q: "In a cloud chamber, Alpha particles produce paths that are:", options: ["Thin and curved", "Thick and straight", "Zig-zag", "Random"], answer: 1, exp: "Being heavy and highly ionizing, they leave dense, direct tracks." },
        { q: "In a cloud chamber, Beta particles produce paths that are:", options: ["Thick and straight", "Thin and zig-zag", "Invisible", "Circular"], answer: 1, exp: "Being light, they are easily deflected by air molecules, creating thin, erratic paths." },
        { q: "The number of protons in Tritium is:", options: ["1", "2", "3", "0"], answer: 0, exp: "All isotopes of hydrogen have exactly 1 proton." },
        { q: "The number of neutrons in Tritium is:", options: ["1", "2", "3", "0"], answer: 1, exp: "$^3H$ has 3 nucleons: 1 proton and 2 neutrons." },
        { q: "Uranium-235 and Uranium-238 are:", options: ["Isomers", "Isobars", "Isotopes", "Allotropes"], answer: 2, exp: "Same protons (92), different neutrons." },
        { q: "The element formed after Thorium-234 (Z=90) emits a beta particle is:", options: ["Actinium (89)", "Protactinium (91)", "Uranium (92)", "Radium (88)"], answer: 1, exp: "$90 + 1 = 91$ (Protactinium)." },
        { q: "Radioactivity is a ____ property:", options: ["Atomic", "Molecular", "Nuclear", "Electronic"], answer: 2, exp: "It originates from the nucleus, not the electron shells." },
        { q: "What is the mass number of an alpha particle?", options: ["1", "2", "3", "4"], answer: 3, exp: "Composed of 2 protons and 2 neutrons." },
        { q: "What is the mass number of a beta particle?", options: ["0", "1", "-1", "1/1836"], answer: 0, exp: "For nuclear calculations, the mass number of an electron is considered zero." },
        { q: "Which radiations are electromagnetic waves?", options: ["Alpha", "Beta", "Gamma", "Cathode"], answer: 2, exp: "Gamma rays are high-frequency EM waves." },
        { q: "Which particle has the highest charge-to-mass ratio?", options: ["Alpha", "Beta", "Proton", "Neutron"], answer: 1, exp: "The electron (beta) has very little mass compared to its charge." },
        { q: "The stability of a nucleus depends on the ratio of:", options: ["Protons/Electrons", "Neutrons/Protons", "Protons/Alpha", "Neutrons/Electrons"], answer: 1, exp: "The N/Z ratio determines if a nucleus is stable or radioactive." }
      ]
    }
  }
        };

        // ---------------------------------------------------------
        // UI LOGIC & RENDER FUNCTIONS
        // ---------------------------------------------------------

        // Switch between major views
        function showView(viewId) {
            document.getElementById('dashboard-view').classList.add('hidden');
            document.getElementById('test-creator-view').classList.add('hidden');
            document.getElementById('quiz-view').classList.add('hidden');
            
            document.getElementById(viewId).classList.remove('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Initialize Dashboard
        function initDashboard() {
            const container = document.getElementById('chapters-container');
            const testList = document.getElementById('test-chapters-list');
            container.innerHTML = '';
            testList.innerHTML = '';

            Object.keys(mcqDatabase).forEach(chNum => {
                const chapter = mcqDatabase[chNum];
                
                // Count questions
                let qCount = 0;
                Object.values(chapter.topics).forEach(topicArr => qCount += topicArr.length);
                
                // 1. Render Dashboard Cards
                const card = document.createElement('div');
                card.className = `group bg-white rounded-3xl p-6 cursor-pointer border border-slate-200 shadow-sm hover:shadow-xl hover:border-blue-200 hover:-translate-y-1 transition-all duration-300 relative overflow-hidden`;
                card.onclick = () => loadChapterQuiz(chNum);
                
                card.innerHTML = `
                    <div class="flex items-center justify-between mb-4">
                        <span class="text-xs font-bold text-slate-500 bg-slate-100 px-3 py-1.5 rounded-full group-hover:bg-blue-100 group-hover:text-blue-700 transition-colors">CH ${chNum}</span>
                        <span class="text-xs font-semibold text-slate-400">${qCount} MCQs</span>
                    </div>
                    <h3 class="text-lg font-bold text-slate-800 leading-tight mb-2 group-hover:text-blue-600 transition-colors">${chapter.title}</h3>
                    <div class="absolute bottom-0 right-0 p-6 opacity-0 group-hover:opacity-100 transition-all transform translate-x-4 group-hover:translate-x-0">
                        <div class="w-8 h-8 bg-blue-600 rounded-full flex items-center justify-center text-white shadow-md">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                        </div>
                    </div>
                `;
                container.appendChild(card);

                // 2. Render Checkboxes in Test Creator
                const checkboxLabel = document.createElement('label');
                checkboxLabel.className = "flex items-center gap-3 p-4 bg-white border border-slate-200 rounded-xl cursor-pointer hover:bg-slate-50 transition-colors";
                checkboxLabel.innerHTML = `
                    <input type="checkbox" value="${chNum}" class="chapter-checkbox w-5 h-5 accent-blue-600 rounded">
                    <div class="flex flex-col">
                        <span class="text-sm font-bold text-slate-800 leading-tight">Ch ${chNum}: ${chapter.title}</span>
                        <span class="text-xs text-slate-400">${qCount} questions available</span>
                    </div>
                `;
                testList.appendChild(checkboxLabel);
            });
        }

        // Load a Specific Chapter
        function loadChapterQuiz(chNum) {
            const chapter = mcqDatabase[chNum];
            document.getElementById('quiz-header-title').innerText = `Chapter ${chNum}: ${chapter.title}`;
            
            let questionsToRender = [];
            // Extract all questions from topics
            Object.keys(chapter.topics).forEach(topicName => {
                const topicQuestions = chapter.topics[topicName].map(q => ({
                    ...q, 
                    topicLabel: topicName 
                }));
                questionsToRender = questionsToRender.concat(topicQuestions);
            });

            renderQuestions(questionsToRender);
            showView('quiz-view');
        }

        // Generate Custom Test
        function generateCustomTest() {
            const checkboxes = document.querySelectorAll('.chapter-checkbox:checked');
            const selectedChNums = Array.from(checkboxes).map(cb => cb.value);
            const requestedCount = parseInt(document.getElementById('test-q-count').value);

            if (selectedChNums.length === 0) {
                alert("Please select at least one chapter.");
                return;
            }

            let pool = [];
            selectedChNums.forEach(chNum => {
                const chapter = mcqDatabase[chNum];
                Object.keys(chapter.topics).forEach(topicName => {
                    const topicQuestions = chapter.topics[topicName].map(q => ({
                        ...q, 
                        topicLabel: `Ch ${chNum} - ${topicName}` 
                    }));
                    pool = pool.concat(topicQuestions);
                });
            });

            if (pool.length === 0) {
                alert("The selected chapters currently have no questions.");
                return;
            }

            // Shuffle pool
            pool.sort(() => Math.random() - 0.5);
            
            // Slice to requested count
            const finalQuestions = pool.slice(0, requestedCount);
            
            document.getElementById('quiz-header-title').innerText = `Custom Test (${finalQuestions.length} Questions)`;
            renderQuestions(finalQuestions);
            showView('quiz-view');
        }

        // Master function to render HTML for questions
        function renderQuestions(questionsArr) {
            const container = document.getElementById('questions-container');
            container.innerHTML = '';

            if(questionsArr.length === 0) {
                container.innerHTML = `
                    <div class="bg-white border-2 border-dashed border-slate-200 rounded-3xl p-12 text-center text-slate-500">
                        <svg class="w-12 h-12 mx-auto mb-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
                        <p class="font-medium text-lg">No questions available in this section yet.</p>
                        <p class="text-sm mt-1">Add them to the mcqDatabase object in the code.</p>
                    </div>`;
                return;
            }

            questionsArr.forEach((qObj, index) => {
                const qId = `q_${index}`;
                
                // Construct options HTML
                let optionsHTML = '';
                qObj.options.forEach((optText, optIndex) => {
                    optionsHTML += `
                        <label class="option-label flex items-start gap-3 p-4 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer hover:bg-slate-100 w-full relative">
                            <input type="radio" name="${qId}" value="${optIndex}" class="mt-0.5 shrink-0 text-blue-600" 
                                onchange="handleAnswerSelect(this, ${optIndex}, ${qObj.answer})">
                            <span class="font-medium flex-1">${optText}</span>
                            <div class="feedback-icon hidden absolute right-4 top-1/2 -translate-y-1/2"></div>
                        </label>
                    `;
                });

                // Construct full question card
                const questionHTML = `
                    <div class="question-card animate-fade-in bg-white rounded-3xl p-6 md:p-8 shadow-sm border border-slate-100" style="animation-delay: ${index * 0.05}s">
                        ${qObj.topicLabel ? `<div class="text-xs font-bold text-blue-500 uppercase tracking-wider mb-3">${qObj.topicLabel}</div>` : ''}
                        
                        <h3 class="text-lg font-bold text-slate-900 mb-6 flex gap-3 leading-snug">
                            <span class="text-blue-600 shrink-0">${index + 1}.</span> 
                            <span>${qObj.q}</span>
                        </h3>
                        
                        <div class="space-y-3">
                            ${optionsHTML}
                        </div>

                        <!-- Explanation Box (Hidden initially) -->
                        <div class="explanation-box hidden mt-6 p-4 bg-blue-50/50 border border-blue-100 rounded-xl">
                            <div class="flex gap-2 items-start text-blue-800">
                                <svg class="w-5 h-5 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                <div>
                                    <span class="font-bold text-sm block mb-1">Explanation</span>
                                    <p class="text-sm leading-relaxed text-blue-900/80">${qObj.exp || "No explanation provided."}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', questionHTML);
            });
        }

        // Core interactive logic: Handles selection, styling, and changeable answers
        function handleAnswerSelect(radioInput, selectedIndex, correctIndex) {
            const card = radioInput.closest('.question-card');
            const allLabels = card.querySelectorAll('.option-label');
            const explanationBox = card.querySelector('.explanation-box');

            // SVG Icons
            const checkIcon = `<svg class="w-6 h-6 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>`;
            const crossIcon = `<svg class="w-6 h-6 text-rose-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>`;

            // 1. Reset all labels to default style
            allLabels.forEach(label => {
                label.className = "option-label flex items-start gap-3 p-4 bg-slate-50 border border-slate-200 rounded-xl cursor-pointer hover:bg-slate-100 w-full relative text-slate-800";
                label.querySelector('.feedback-icon').innerHTML = '';
                label.querySelector('.feedback-icon').classList.add('hidden');
                
                // Color the radio buttons back to default
                label.querySelector('input').style.color = ''; 
            });

            // 2. Identify the currently selected label
            const selectedLabel = radioInput.closest('.option-label');
            const feedbackIconContainer = selectedLabel.querySelector('.feedback-icon');

            // 3. Apply Correct or Wrong styles instantly
            if (selectedIndex === correctIndex) {
                // Correct Choice Selected
                selectedLabel.className = "option-label flex items-start gap-3 p-4 bg-emerald-50 border border-emerald-400 rounded-xl cursor-pointer w-full relative text-emerald-900 shadow-sm";
                radioInput.style.color = '#10b981'; // Green radio dot
                feedbackIconContainer.innerHTML = checkIcon;
                feedbackIconContainer.classList.remove('hidden');
                
                // Show explanation
                explanationBox.classList.remove('hidden');
                explanationBox.classList.add('animate-fade-in');
            } else {
                // Wrong Choice Selected
                selectedLabel.className = "option-label flex items-start gap-3 p-4 bg-rose-50 border border-rose-300 rounded-xl cursor-pointer w-full relative text-rose-900 shadow-sm";
                radioInput.style.color = '#f43f5e'; // Red radio dot
                feedbackIconContainer.innerHTML = crossIcon;
                feedbackIconContainer.classList.remove('hidden');

                // Hide explanation if they switch to a wrong answer
                explanationBox.classList.add('hidden');
            }
        }

        // Initialize App on load
        window.onload = initDashboard;
    </script>
</body>
